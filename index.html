<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Sampler</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f5f5f5;
    --accent: #000;
    --sidebar-w: 500px;
    --topbar-h: 52px;
  }

  body.dark {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --hover: #1a1a1a;
    --accent: #e8e8e8;
  }

  body.dark iconify-icon { color: var(--fg); }
  body.dark .scale-slider { background: var(--border); }
  body.dark .scale-slider::-webkit-slider-thumb { background: var(--fg); }

  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; height: 100vh; }

  .sidebar {
    width: var(--sidebar-w);
    min-width: 180px;
    max-width: 500px;
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }

  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--fg);
    opacity: 0.12;
  }

  .sidebar-header {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header .mode-tab {
    flex: 1;
    padding: 14px 16px 10px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.01em;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    transition: color 0.15s;
    text-align: center;
  }

  .sidebar-header .mode-tab.active { color: var(--fg); }
  .sidebar-header .mode-tab:hover:not(.active) { color: var(--fg); opacity: 0.6; }

  .sidebar-header p { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .sidebar-sort {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sort-btn {
    flex: 1;
    padding: 5px 8px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
  }

  .sort-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .sort-btn:hover:not(.active) { background: var(--hover); color: var(--fg); }

  .sidebar-search {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }

  .sidebar-search input:focus { border-color: var(--fg); }
  .sidebar-search input::placeholder { color: var(--muted); }

  .set-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .set-list::-webkit-scrollbar { width: 4px; }
  .set-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tier-label {
    padding: 10px 16px 5px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }

  .set-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .set-item:hover { background: var(--hover); }
  .set-item.active { background: var(--fg); color: var(--bg); }

  .set-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .set-item.active .dot { background: var(--bg); }

  .set-info { flex: 1; min-width: 0; }

  .set-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .set-count {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .set-item.active .set-count { color: rgba(255,255,255,0.5); }


  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: var(--topbar-h);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scale-slider {
    width: 140px;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
  }

  .scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
  }

  .scale-value {
    font-size: 11px;
    font-weight: 500;
    min-width: 36px;
    font-variant-numeric: tabular-nums;
  }

  .scale-presets { display: flex; gap: 3px; }

  .scale-presets button, .tb-btn {
    padding: 3px 7px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .scale-presets button:hover, .scale-presets button.active,
  .tb-btn:hover {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .view-toggle { margin-left: auto; display: flex; gap: 0; }

  .view-toggle button {
    padding: 4px 10px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .view-toggle button:first-child { border-radius: 3px 0 0 3px; }
  .view-toggle button:last-child { border-radius: 0 3px 3px 0; }
  .view-toggle button + button { border-left: none; }

  .view-toggle button.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .tb-btn { padding: 4px 10px; }

  .canvas { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 20px; }
  .canvas::-webkit-scrollbar { height: 6px; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .set-section { margin-bottom: 32px; }

  .set-section-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .set-section-title { font-size: 12px; font-weight: 600; }
  .set-section-count { font-size: 10px; color: var(--muted); }
  .set-section-author { font-size: 10px; color: var(--muted); margin-left: auto; }

  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    flex-direction: column;
    align-content: flex-start;
    gap: 1px;
    max-height: calc(100vh - var(--topbar-h) - 120px);
    padding-bottom: 4px;
  }

  .icon-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    border-radius: 3px;
    transition: background 0.1s, opacity 0.18s, transform 0.18s;
    cursor: pointer;
    position: relative;
    opacity: 0;
    transform: scale(0.8);
  }

  .icon-cell.visible {
    opacity: 1;
    transform: scale(1);
  }

  .icon-cell:hover { background: var(--hover); }
  .icon-cell iconify-icon { display: block; pointer-events: none; }
  .icon-cell .tooltip { pointer-events: none; }

  .icon-cell .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--fg);
    color: var(--bg);
    padding: 3px 7px;
    border-radius: 3px;
    font-size: 9px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }

  .icon-cell:hover .tooltip { display: block; }

  .single-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    gap: 24px;
    text-align: center;
  }

  .single-icon-display iconify-icon { display: block; }

  .single-nav { display: flex; align-items: center; gap: 20px; }

  .single-nav button {
    padding: 6px 16px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .single-nav button:hover { background: var(--fg); color: var(--bg); }

  .variant-line {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 500px;
  }

  .variant-line .variant-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    opacity: 0.5;
  }

  .variant-line .variant-icon:hover { background: var(--hover); opacity: 1; }
  .variant-line .variant-icon.current { opacity: 1; background: var(--hover); }

  .versions-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 700px;
  }

  .version-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .version-card:hover { background: var(--hover); }
  .version-card .version-label { font-size: 9px; color: var(--muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .single-icon-name { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .single-set-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  /* Fullscreen */
  body.fullscreen .sidebar { display: none; }
  body.fullscreen .topbar { display: none; }
  body.fullscreen .canvas { padding: 0; }
  body.fullscreen .icon-grid { gap: 0; }
  body.fullscreen .icon-cell { border-radius: 0; }
  body.fullscreen .set-section { margin-bottom: 0; }
  body.fullscreen .set-section-header { display: none; }

  .fs-toolbar {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    gap: 10px;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  body.fullscreen .fs-toolbar { display: flex; }

  .fs-toolbar .scale-slider { width: 100px; }

  .fs-toolbar select {
    font-family: inherit;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    outline: none;
    max-width: 160px;
  }

  .fs-close {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    transition: all 0.1s;
  }

  .fs-close:hover { background: var(--fg); color: var(--bg); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
  }

  .sidebar-filters {
    display: flex;
    gap: 4px;
    padding: 6px 12px 0;
  }

  .filter-btn {
    padding: 4px 10px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--fg); border-color: var(--fg); }

  .filter-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .keyboard-hint {
    padding: 6px 12px;
    font-size: 9px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  kbd {
    display: inline-block;
    padding: 1px 4px;
    font-family: inherit;
    font-size: 9px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--hover);
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="mode-tab active" id="modeIcons" onclick="setMode('icons')">Icons</button>
      <button class="mode-tab" id="modeButtons" onclick="setMode('buttons')">Buttons</button>
    </div>
    <div class="sidebar-sort">
      <button class="sort-btn active" id="btnSortCategory" onclick="setSortMode('category')">By Category</button>
      <button class="sort-btn" id="btnSortName" onclick="setSortMode('name')">By Name</button>
    </div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search sets..." oninput="filterSets(this.value)">
    </div>
    <div class="sidebar-filters">
      <button class="filter-btn" id="filterColor" onclick="toggleFilter('color')">Color</button>
      <button class="filter-btn" id="filterAnimated" onclick="toggleFilter('animated')">Animated</button>
    </div>
    <div class="keyboard-hint">
      <kbd>↑</kbd><kbd>↓</kbd> Sets <kbd>←</kbd><kbd>→</kbd> Icons <kbd>Space</kbd> Versions <kbd>F</kbd> Full <kbd>D</kbd> Dark <kbd>Esc</kbd> Exit
    </div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="main">
    <div class="topbar">
      <label>Scale</label>
      <input type="range" class="scale-slider" id="scaleSlider" min="12" max="512" value="24">
      <span class="scale-value" id="scaleValue">24px</span>
      <div class="scale-presets">
        <button onclick="setScale(16)">16</button>
        <button onclick="setScale(24)" class="active">24</button>
        <button onclick="setScale(48)">48</button>
        <button onclick="setScale(96)">96</button>
        <button onclick="setScale(128)">128</button>
        <button onclick="setScale(256)">256</button>
        <button onclick="setScale(512)">512</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')" id="btnGrid">Grid</button>
        <button onclick="setView('single')" id="btnSingle">Single</button>
        <button onclick="setView('versions')" id="btnVersions">Versions</button>
      </div>
      <button class="tb-btn" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="tb-btn" onclick="toggleDark()" id="btnDark">Dark</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="empty-state">Select an icon set to begin</div>
    </div>
  </div>
</div>

<div class="fs-toolbar" id="fsToolbar">
  <select id="fsSetSelect" onchange="fsSelectSet(this.value)"></select>
  <label style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Scale</label>
  <input type="range" class="scale-slider" id="fsScaleSlider" min="12" max="512" value="24">
  <span class="scale-value" id="fsScaleValue">24px</span>
  <div class="scale-presets">
    <button onclick="setScale(24)">24</button>
    <button onclick="setScale(48)">48</button>
    <button onclick="setScale(96)">96</button>
    <button onclick="setScale(256)">256</button>
    <button onclick="setScale(512)">512</button>
  </div>
  <button class="tb-btn" onclick="toggleDark()" id="btnDarkFs">Dark</button>
  <button class="fs-close" onclick="toggleFullscreen()" title="Exit (Esc)">&#215;</button>
</div>

<script>
let SETS = [];
let TIER_ORDER = [];
let activeSets = new Set();
let currentScale = 24;
let currentView = 'grid';
let singleIndex = 0;
let allVisibleIcons = [];
let searchFilter = '';
let sortMode = 'category'; // 'category' or 'name'
let selectedVariant = null; // specific variant in single view
let activeFilter = null; // null, 'color', or 'animated'
let appMode = 'icons'; // 'icons' or 'buttons'
const iconCache = {}; // prefix -> [icon names]

async function loadCollections() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '<div class="empty-state">Loading collections...</div>';
  try {
    const res = await fetch('https://api.iconify.design/collections');
    const data = await res.json();
    // Build SETS from API data
    const sets = [];
    const categories = new Set();
    for (const [prefix, info] of Object.entries(data)) {
      const tier = info.category || 'Uncategorized';
      categories.add(tier);
      sets.push({
        id: prefix,
        prefix: prefix,
        name: info.name || prefix,
        tier: tier,
        count: info.total || 0,
        author: info.author?.name || '',
        license: info.license?.spdx || info.license?.title || '',
        sample: info.samples || [],
        palette: !!info.palette,
        animated: !!(info.tags && info.tags.includes('Contains Animations')),
      });
    }
    // Sort by category then name
    TIER_ORDER = [...categories].sort();
    sets.sort((a, b) => {
      const ti = TIER_ORDER.indexOf(a.tier) - TIER_ORDER.indexOf(b.tier);
      if (ti !== 0) return ti;
      return a.name.localeCompare(b.name);
    });
    SETS = sets;
    document.querySelector('title').textContent = `Icon Sampler — ${SETS.length} Sets`;
    // Default to first set
    if (SETS.length) activeSets.add(SETS[0].id);
    buildFsSelect();
    renderSidebar();
    await renderCanvas();
    syncFsSelect();
  } catch (e) {
    canvas.innerHTML = '<div class="empty-state">Failed to load collections. Check network.</div>';
  }
}

function setMode(mode) {
  appMode = mode;
  document.getElementById('modeIcons').classList.toggle('active', mode === 'icons');
  document.getElementById('modeButtons').classList.toggle('active', mode === 'buttons');
  // TODO: switch sidebar content between icons and buttons
  renderSidebar();
  renderCanvas();
}

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('btnSortCategory').classList.toggle('active', mode === 'category');
  document.getElementById('btnSortName').classList.toggle('active', mode === 'name');
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('setList');
  let filtered = searchFilter
    ? SETS.filter(s => {
        if (s.name.toLowerCase().includes(searchFilter) || s.author.toLowerCase().includes(searchFilter) || s.tier.toLowerCase().includes(searchFilter)) return true;
        // Also match if any cached icon name contains the search term
        const cached = iconCache[s.prefix];
        if (cached) return cached.some(name => name.toLowerCase().includes(searchFilter));
        // Check sample icons as fallback
        return s.sample.some(name => name.toLowerCase().includes(searchFilter));
      })
    : [...SETS];

  // Apply type filter
  if (activeFilter === 'color') filtered = filtered.filter(s => s.palette);
  if (activeFilter === 'animated') filtered = filtered.filter(s => s.animated);

  if (sortMode === 'name') {
    filtered = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
  }

  let html = '';
  let lastTier = '';
  for (const s of filtered) {
    if (sortMode === 'category' && s.tier !== lastTier) {
      html += `<div class="tier-label">${s.tier}</div>`;
      lastTier = s.tier;
    }
    const active = activeSets.has(s.id) ? ' active' : '';
    html += `<div class="set-item${active}" onclick="loadSet('${s.id}')">
      <div class="dot"></div>
      <div class="set-info"><div class="set-name">${s.name}</div></div>
      <div class="set-count">${s.count.toLocaleString()}</div>
    </div>`;
  }
  el.innerHTML = html;
}

function filterSets(q) {
  searchFilter = q.toLowerCase();
  renderSidebar();
}

function toggleFilter(type) {
  activeFilter = activeFilter === type ? null : type;
  document.getElementById('filterColor').classList.toggle('active', activeFilter === 'color');
  document.getElementById('filterAnimated').classList.toggle('active', activeFilter === 'animated');
  renderSidebar();
}

async function loadSet(id) {
  activeSets.clear();
  activeSets.add(id);
  renderSidebar();
  await renderCanvas();
  syncFsSelect();
}

function selectAll() {
  SETS.forEach(s => activeSets.add(s.id));
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

function selectNone() {
  activeSets.clear();
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

const slider = document.getElementById('scaleSlider');
const fsSlider = document.getElementById('fsScaleSlider');
slider.addEventListener('input', () => { currentScale = parseInt(slider.value); updateScale(); });
fsSlider.addEventListener('input', () => { currentScale = parseInt(fsSlider.value); updateScale(); });

function setScale(v) { currentScale = v; updateScale(); }

let scaleRenderTimer = null;
function updateScale() {
  slider.value = currentScale;
  fsSlider.value = currentScale;
  document.getElementById('scaleValue').textContent = currentScale + 'px';
  document.getElementById('fsScaleValue').textContent = currentScale + 'px';
  document.querySelectorAll('.scale-presets button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === currentScale);
  });
  // Debounce render for smooth pinch
  clearTimeout(scaleRenderTimer);
  scaleRenderTimer = setTimeout(() => renderCanvas(), 50);
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnSingle').classList.toggle('active', v === 'single');
  document.getElementById('btnVersions').classList.toggle('active', v === 'versions');
  if (v === 'grid') singleIndex = 0;
  renderCanvas();
}

function toggleFullscreen() { document.body.classList.toggle('fullscreen'); }

function toggleDark() {
  document.body.classList.toggle('dark');
  const d = document.body.classList.contains('dark');
  document.getElementById('btnDark').textContent = d ? 'Light' : 'Dark';
  document.getElementById('btnDarkFs').textContent = d ? 'Light' : 'Dark';
}

function buildFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  let html = '<option value="__all__">All Sets</option>';
  let lastTier = '';
  for (const s of SETS) {
    if (s.tier !== lastTier) {
      if (lastTier) html += '</optgroup>';
      html += `<optgroup label="${s.tier}">`;
      lastTier = s.tier;
    }
    html += `<option value="${s.id}">${s.name} (${s.count.toLocaleString()})</option>`;
  }
  html += '</optgroup>';
  sel.innerHTML = html;
}

function syncFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  if (activeSets.size === SETS.length) sel.value = '__all__';
  else if (activeSets.size === 1) sel.value = [...activeSets][0];
}

function fsSelectSet(val) {
  if (val === '__all__') selectAll();
  else loadSet(val);
}

async function fetchIcons(prefix) {
  if (iconCache[prefix]) return iconCache[prefix];
  try {
    const res = await fetch(`https://api.iconify.design/collection?prefix=${prefix}`);
    const data = await res.json();
    let icons = [];
    if (data.uncategorized) icons = data.uncategorized;
    else if (data.categories) {
      for (const cat of Object.values(data.categories)) icons.push(...cat);
    }
    if (!icons.length && data.icons) icons = data.icons;
    iconCache[prefix] = icons;
    return icons;
  } catch {
    const s = SETS.find(s => s.prefix === prefix);
    return s ? s.sample : [];
  }
}

function getIcons(s) {
  return iconCache[s.prefix] || s.sample;
}

async function renderCanvas() {
  const canvas = document.getElementById('canvas');
  const active = SETS.filter(s => activeSets.has(s.id));

  if (!active.length) {
    canvas.innerHTML = '<div class="empty-state">Select an icon set to begin</div>';
    return;
  }

  // Fetch icons for all active sets
  const needsFetch = active.filter(s => !iconCache[s.prefix]);
  if (needsFetch.length) {
    canvas.innerHTML = '<div class="empty-state">Loading icons...</div>';
    await Promise.all(needsFetch.map(s => fetchIcons(s.prefix)));
  }

  if (currentView === 'single' || currentView === 'versions') return renderSingleView(canvas, active);

  const cellSize = Math.max(currentScale + 8, 28);
  // Build allVisibleIcons for click-to-single
  allVisibleIcons = [];
  active.forEach(s => {
    const names = getIcons(s);
    names.forEach(n => allVisibleIcons.push({ icon: `${s.prefix}:${n}`, set: s.name }));
  });

  let globalIdx = 0;
  canvas.innerHTML = active.map(s => {
    const names = getIcons(s);
    const icons = names.map(n => `${s.prefix}:${n}`);
    const html = `<div class="set-section">
      <div class="set-section-header">
        <span class="set-section-title">${s.name}</span>
        <span class="set-section-count">${icons.length.toLocaleString()} icons · ${s.license}</span>
        <span class="set-section-author">${s.author}</span>
      </div>
      <div class="icon-grid">${icons.map(icon => {
        const idx = globalIdx++;
        return `<div class="icon-cell" style="width:${cellSize}px" onclick="openSingle(${idx})">
          <iconify-icon icon="${icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
          <div class="tooltip">${icon}</div>
        </div>`;
      }).join('')}</div>
    </div>`;
    return html;
  }).join('');

  animateIcons();
}

function getVariants(baseName, icons) {
  return icons.filter(ic => {
    const name = ic.icon.split(':')[1];
    return iconBaseName(name) === baseName;
  });
}

function getUniqueBaseIcons(icons) {
  const seen = new Set();
  const result = [];
  for (const ic of icons) {
    const base = iconBaseName(ic.icon.split(':')[1]);
    if (!seen.has(base)) {
      seen.add(base);
      result.push(ic);
    }
  }
  return result;
}

function renderSingleView(canvas, active) {
  allVisibleIcons = [];
  active.forEach(s => {
    const names = getIcons(s);
    names.forEach(n => allVisibleIcons.push({ icon: `${s.prefix}:${n}`, set: s.name, prefix: s.prefix }));
  });
  if (!allVisibleIcons.length) return;

  // For single/versions, navigate by unique base icons
  const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
  if (singleIndex >= uniqueIcons.length) singleIndex = 0;
  if (singleIndex < 0) singleIndex = uniqueIcons.length - 1;

  const baseIcon = uniqueIcons[singleIndex];
  const baseName = iconBaseName(baseIcon.icon.split(':')[1]);
  const variants = getVariants(baseName, allVisibleIcons);
  // Use selected variant if it matches current base, otherwise use base icon
  const c = (selectedVariant && iconBaseName(selectedVariant.split(':')[1]) === baseName)
    ? (allVisibleIcons.find(ic => ic.icon === selectedVariant) || baseIcon)
    : baseIcon;
  const sz = Math.max(currentScale, 500);

  if (currentView === 'versions') {
    // Full versions view — all variants displayed larger
    canvas.innerHTML = `<div class="single-view">
      <div class="single-set-name">${c.set}</div>
      <div class="single-icon-name" style="font-size:13px;font-weight:600;margin-bottom:8px">${baseName}</div>
      <div class="versions-grid">${variants.map((v, i) => {
        const vName = v.icon.split(':')[1];
        const suffix = vName.replace(baseName, '').replace(/^-/, '') || 'default';
        return `<div class="version-card" onclick="selectVariant('${v.icon}')">
          <iconify-icon icon="${v.icon}" width="48" height="48"></iconify-icon>
          <div class="version-label" title="${vName}">${suffix}</div>
        </div>`;
      }).join('')}</div>
      <div class="single-icon-name">${variants.length} variant${variants.length !== 1 ? 's' : ''}</div>
      <div class="single-nav">
        <button onclick="navSingle(-1)">&larr; Prev</button>
        <span class="single-icon-name">${singleIndex + 1} / ${uniqueIcons.length}</span>
        <button onclick="navSingle(1)">Next &rarr;</button>
      </div>
    </div>`;
    return;
  }

  // Single view with variant line below
  const variantHtml = variants.length > 1 ? `<div class="variant-line">${variants.map(v => {
    const isCurrent = v.icon === c.icon;
    return `<div class="variant-icon${isCurrent ? ' current' : ''}" onclick="selectVariant('${v.icon}')" title="${v.icon.split(':')[1]}">
      <iconify-icon icon="${v.icon}" width="20" height="20"></iconify-icon>
    </div>`;
  }).join('')}</div>` : '';

  canvas.innerHTML = `<div class="single-view">
    <div class="single-set-name">${c.set}</div>
    <div class="single-icon-display">
      <iconify-icon icon="${c.icon}" width="${sz}" height="${sz}"></iconify-icon>
    </div>
    <div class="single-icon-name">${c.icon}</div>
    ${variantHtml}
    <div class="single-nav">
      <button onclick="navSingle(-1)">&larr; Prev</button>
      <span class="single-icon-name">${singleIndex + 1} / ${uniqueIcons.length}</span>
      <button onclick="navSingle(1)">Next &rarr;</button>
    </div>
  </div>`;
}

function animateIcons() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const cell = entry.target;
        const delay = parseInt(cell.dataset.delay) || 0;
        setTimeout(() => cell.classList.add('visible'), delay);
        observer.unobserve(cell);
      }
    });
  }, { rootMargin: '400px' });

  document.querySelectorAll('.icon-cell:not(.visible)').forEach((cell, i) => {
    cell.dataset.delay = Math.min(i % 40, 15) * 6;
    observer.observe(cell);
  });
}

function navSingle(dir) { singleIndex += dir; selectedVariant = null; renderCanvas(); }

function openSingle(idx) {
  // Convert grid index to unique base icon index
  if (allVisibleIcons.length) {
    const targetIcon = allVisibleIcons[idx];
    if (targetIcon) {
      const baseName = iconBaseName(targetIcon.icon.split(':')[1]);
      const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
      const baseIdx = uniqueIcons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
      singleIndex = baseIdx !== -1 ? baseIdx : 0;
    }
  }
  currentView = 'single';
  setView('single');
}

function selectVariant(fullIcon) {
  // Find which base icon this variant belongs to and update singleIndex
  const baseName = iconBaseName(fullIcon.split(':')[1]);
  const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
  const baseIdx = uniqueIcons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
  if (baseIdx !== -1) singleIndex = baseIdx;
  // In single view, switch the displayed icon to this variant
  // We need to store which variant is selected
  selectedVariant = fullIcon;
  renderCanvas();
}

// Strip variant suffixes to get a base icon name for cross-set matching
function iconBaseName(name) {
  return name
    .replace(/-(thin|light|bold|duotone|fill|filled|solid|outline|outlined|regular|sharp|twotone|broken|linear|bulk)$/g, '')
    .replace(/-(12|16|20|24|32|48)$/g, '')
    .replace(/-alt\d*$/g, '');
}

function findIconMatch(iconName, icons) {
  const baseName = iconBaseName(iconName);
  if (baseName.length < 2) return -1;
  // Exact match
  let idx = icons.findIndex(ic => ic.icon.split(':')[1] === iconName);
  // Base name match
  if (idx === -1) idx = icons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
  // Candidate contains our base name (not reverse — too loose)
  if (idx === -1 && baseName.length >= 3) idx = icons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]).includes(baseName));
  return idx;
}

async function navSet(dir) {
  const visible = searchFilter
    ? SETS.filter(s => s.name.toLowerCase().includes(searchFilter) || s.author.toLowerCase().includes(searchFilter) || s.tier.toLowerCase().includes(searchFilter))
    : SETS;
  if (!visible.length) return;
  const currentId = activeSets.size === 1 ? [...activeSets][0] : null;

  // Remember current icon name for cross-set matching in single view
  let matchIconName = null;
  if (currentView === 'single' && currentId && allVisibleIcons.length) {
    const cur = allVisibleIcons[singleIndex];
    if (cur) matchIconName = cur.icon.split(':')[1];
  }

  let startIdx = currentId ? visible.findIndex(s => s.id === currentId) : -1;
  let idx = startIdx;

  // If in single view with a match name, skip sets that don't have it
  if (matchIconName && currentView === 'single') {
    const maxTries = visible.length;
    for (let tries = 0; tries < maxTries; tries++) {
      idx += dir;
      if (idx < 0) idx = visible.length - 1;
      if (idx >= visible.length) idx = 0;
      if (idx === startIdx) break; // wrapped around, no match anywhere
      await loadSet(visible[idx].id);
      const matchIdx = findIconMatch(matchIconName, allVisibleIcons);
      if (matchIdx !== -1) {
        singleIndex = matchIdx;
        renderCanvas();
        break;
      }
    }
  } else {
    idx += dir;
    if (idx < 0) idx = visible.length - 1;
    if (idx >= visible.length) idx = 0;
    await loadSet(visible[idx].id);
  }

  // Scroll active item into view
  const el = document.querySelector('.set-item.active');
  if (el) el.scrollIntoView({ block: 'nearest' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (document.body.classList.contains('fullscreen')) toggleFullscreen(); return; }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'd' || e.key === 'D') toggleDark();
  if (e.key === 'ArrowUp') { e.preventDefault(); navSet(-1); }
  if (e.key === 'ArrowDown') { e.preventDefault(); navSet(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); navSingle(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navSingle(1); }
  if (e.key === ' ') {
    e.preventDefault();
    if (currentView === 'grid') setView('single');
    else if (currentView === 'single') setView('versions');
    else if (currentView === 'versions') setView('grid');
  }
});

// Resize handle
const resizeHandle = document.getElementById('resizeHandle');
const sidebar = document.querySelector('.sidebar');
let isResizing = false;

resizeHandle.addEventListener('mousedown', e => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const w = Math.min(500, Math.max(180, e.clientX));
  sidebar.style.width = w + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizeHandle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// Pinch-to-zoom and scroll remapping on canvas
document.getElementById('canvas').addEventListener('wheel', e => {
  if (e.ctrlKey) {
    e.preventDefault();
    const factor = 1 - e.deltaY * 0.01;
    currentScale = Math.round(Math.min(512, Math.max(12, currentScale * factor)));
    updateScale();
    return;
  }
  // Map vertical scroll to horizontal on canvas
  const canvas = document.getElementById('canvas');
  e.preventDefault();
  canvas.scrollLeft += e.deltaY + e.deltaX;
}, { passive: false });

loadCollections();
</script>
