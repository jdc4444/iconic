<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Sampler</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f5f5f5;
    --accent: #000;
    --sidebar-w: 500px;
    --topbar-h: 52px;
  }

  body.dark {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --hover: #1a1a1a;
    --accent: #e8e8e8;
  }

  body.dark iconify-icon { color: var(--fg); }
  body.dark .scale-slider { background: var(--border); }
  body.dark .scale-slider::-webkit-slider-thumb { background: var(--fg); }

  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; height: 100vh; }

  .sidebar {
    width: var(--sidebar-w);
    min-width: 180px;
    max-width: 500px;
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }

  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--fg);
    opacity: 0.12;
  }

  .sidebar-header {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header .mode-tab {
    flex: 1;
    padding: 14px 16px 10px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.01em;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    transition: color 0.15s;
    text-align: center;
  }

  .sidebar-header .mode-tab.active { color: var(--fg); }
  .sidebar-header .mode-tab:hover:not(.active) { color: var(--fg); opacity: 0.6; }

  .sidebar-header p { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .sidebar-sort {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sort-btn {
    flex: 1;
    padding: 5px 8px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
  }

  .sort-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .sort-btn:hover:not(.active) { background: var(--hover); color: var(--fg); }

  .sidebar-search {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }

  .sidebar-search input:focus { border-color: var(--fg); }
  .sidebar-search input::placeholder { color: var(--muted); }

  .set-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .set-list::-webkit-scrollbar { width: 4px; }
  .set-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tier-label {
    padding: 10px 16px 5px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }

  .set-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .set-item:hover { background: var(--hover); }
  .set-item.active { background: var(--fg); color: var(--bg); }

  .set-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .set-item.active .dot { background: var(--bg); }

  .set-info { flex: 1; min-width: 0; }

  .set-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .set-count {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .set-item.active .set-count { color: rgba(255,255,255,0.5); }

  .set-rate {
    display: flex; gap: 2px; flex-shrink: 0; margin-left: 4px;
  }
  .set-rate button {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border);
    border-radius: 50%; cursor: pointer;
    color: var(--muted); font-size: 13px; font-family: inherit;
    line-height: 1; padding: 0;
    transition: all 0.1s;
    opacity: 0;
  }
  .set-item:hover .set-rate button { opacity: 1; }
  .set-rate button:hover { border-color: var(--fg); color: var(--fg); }
  .set-rate button.set-liked { opacity: 1; background: var(--fg); border-color: var(--fg); color: var(--bg); }
  .set-item.active .set-rate button { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }
  .set-item.active .set-rate button:hover { border-color: #fff; color: #fff; }
  .set-item.active .set-rate button.set-liked { background: var(--bg); border-color: var(--bg); color: var(--fg); }


  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: var(--topbar-h);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scale-slider {
    width: 140px;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
  }

  .scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
  }

  .scale-value {
    font-size: 11px;
    font-weight: 500;
    min-width: 36px;
    font-variant-numeric: tabular-nums;
  }

  .scale-presets { display: flex; gap: 3px; }

  .scale-presets button, .tb-btn {
    padding: 3px 7px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .scale-presets button:hover, .scale-presets button.active,
  .tb-btn:hover {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .view-toggle { margin-left: auto; display: flex; gap: 0; }

  .view-toggle button {
    padding: 4px 10px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .view-toggle button:first-child { border-radius: 3px 0 0 3px; }
  .view-toggle button:last-child { border-radius: 0 3px 3px 0; }
  .view-toggle button + button { border-left: none; }

  .view-toggle button.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .tb-btn { padding: 4px 10px; }

  .canvas { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 20px; }
  .canvas::-webkit-scrollbar { height: 6px; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .set-section { margin-bottom: 8px; }

  .set-section-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .set-section-title { font-size: 12px; font-weight: 600; }
  .set-section-count { font-size: 10px; color: var(--muted); }
  .set-section-author { font-size: 10px; color: var(--muted); margin-left: auto; }

  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    flex-direction: column;
    align-content: flex-start;
    gap: 1px;
    max-height: calc(100vh - var(--topbar-h) - 40px);
    padding-bottom: 4px;
  }

  .icon-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    border-radius: 3px;
    transition: background 0.1s, opacity 0.18s, transform 0.18s;
    cursor: pointer;
    position: relative;
    opacity: 0;
    transform: scale(0.8);
  }

  .icon-cell.visible {
    opacity: 1;
    transform: scale(1);
  }

  .icon-cell:hover { background: var(--hover); }
  .icon-cell iconify-icon { display: block; pointer-events: none; }
  .icon-cell .tooltip { pointer-events: none; }

  .icon-cell .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--fg);
    color: var(--bg);
    padding: 3px 7px;
    border-radius: 3px;
    font-size: 9px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }

  .icon-cell:hover .tooltip { display: block; }

  .single-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    gap: 24px;
    text-align: center;
  }

  .single-icon-display iconify-icon { display: block; }

  .single-nav { display: flex; align-items: center; gap: 20px; }

  .single-nav button {
    padding: 6px 16px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .single-nav button:hover { background: var(--fg); color: var(--bg); }

  .variant-line {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 500px;
  }

  .variant-line .variant-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    opacity: 0.5;
  }

  .variant-line .variant-icon:hover { background: var(--hover); opacity: 1; }
  .variant-line .variant-icon.current { opacity: 1; background: var(--hover); }

  .versions-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 700px;
  }

  .version-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .version-card:hover { background: var(--hover); }
  .version-card .version-label { font-size: 9px; color: var(--muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .single-icon-name { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .single-set-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  .rate-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border);
    border-radius: 50%; cursor: pointer;
    color: var(--muted);
    font-size: 18px; line-height: 1;
    font-family: inherit; font-weight: 400;
    transition: all 0.15s;
  }
  .rate-btn:hover { border-color: var(--fg); color: var(--fg); }
  .rate-btn.plus { color: var(--fg); }
  .rate-btn.plus:hover { background: var(--fg); color: var(--bg); }
  .rate-btn.minus:hover { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .rate-btn.liked { background: var(--fg); border-color: var(--fg); color: var(--bg); }

  /* Fullscreen */
  body.fullscreen .sidebar { display: none; }
  body.fullscreen .topbar { display: none; }
  body.fullscreen .canvas { padding: 0; }
  body.fullscreen .icon-grid { gap: 0; }
  body.fullscreen .icon-cell { border-radius: 0; }
  body.fullscreen .set-section { margin-bottom: 0; }
  body.fullscreen .set-section-header { display: none; }

  .fs-toolbar {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    gap: 10px;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  body.fullscreen .fs-toolbar { display: flex; }

  .fs-toolbar .scale-slider { width: 100px; }

  .fs-toolbar select {
    font-family: inherit;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    outline: none;
    max-width: 160px;
  }

  .fs-close {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    transition: all 0.1s;
  }

  .fs-close:hover { background: var(--fg); color: var(--bg); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
  }

  .sidebar-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px 12px;
  }

  .filter-btn {
    padding: 6px 12px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--fg); border-color: var(--fg); }

  .filter-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .keyboard-hint {
    padding: 6px 12px;
    font-size: 9px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  kbd {
    display: inline-block;
    padding: 1px 4px;
    font-family: inherit;
    font-size: 9px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--hover);
  }

  /* === Button Demo Styles === */
  .btn-cat-section { margin-bottom: 28px; }
  .btn-cat-header {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .btn-cat-grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .btn-cat-grid.dark-bg {
    background: #1a1a2e; padding: 16px; border-radius: 8px; margin: -4px;
  }

  .demo-btn {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    padding: 8px 18px; border-radius: 6px; border: 1px solid transparent;
    transition: all 0.18s ease; outline: none; position: relative; overflow: hidden;
    white-space: nowrap;
  }
  .demo-btn:active { transform: scale(0.96); }

  /* Animations */
  @keyframes btn-spin { to { transform: rotate(360deg); } }
  @keyframes btn-pulse { 0%,100% { box-shadow: 0 0 0 0 var(--pulse-color, rgba(25,118,210,0.5)); } 50% { box-shadow: 0 0 0 10px transparent; } }
  @keyframes btn-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes btn-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes btn-rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
  @keyframes btn-glow { from { box-shadow: 0 0 5px var(--glow-color); } to { box-shadow: 0 0 20px var(--glow-color), 0 0 40px color-mix(in srgb, var(--glow-color) 40%, transparent); } }
  @keyframes btn-skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="mode-tab active" id="modeIcons" onclick="setMode('icons')">Icons</button>
      <button class="mode-tab" id="modeButtons" onclick="setMode('buttons')">Buttons</button>
    </div>
    <div class="sidebar-sort">
      <button class="sort-btn active" id="btnSortCategory" onclick="setSortMode('category')">By Category</button>
      <button class="sort-btn" id="btnSortName" onclick="setSortMode('name')">By Name</button>
    </div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search sets..." oninput="filterSets(this.value)">
    </div>
    <div class="sidebar-filters">
      <button class="filter-btn" id="filterColor" onclick="toggleFilter('color')">Color</button>
      <button class="filter-btn" id="filterAnimated" onclick="toggleFilter('animated')">Animated</button>
      <button class="filter-btn" id="filterStroke" onclick="toggleFilter('stroke')">Stroke</button>
      <button class="filter-btn" id="filterEmoji" onclick="toggleFilter('emoji')">Emoji</button>

<button class="filter-btn" id="filterMaterial" onclick="toggleFilter('material')">Material</button>
      <button class="filter-btn" id="filterLiked" onclick="toggleFilter('liked')">Liked</button>
    </div>
    <div class="keyboard-hint">
      <kbd>↑</kbd><kbd>↓</kbd> Sets <kbd>←</kbd><kbd>→</kbd> Icons <kbd>Space</kbd> Versions <kbd>F</kbd> Full <kbd>D</kbd> Dark <kbd>Esc</kbd> Exit
    </div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="main">
    <div class="topbar">
      <label>Scale</label>
      <input type="range" class="scale-slider" id="scaleSlider" min="12" max="512" value="100">
      <span class="scale-value" id="scaleValue">100px</span>
      <div class="scale-presets">
        <button onclick="setScale(16)">16</button>
        <button onclick="setScale(24)">24</button>
        <button onclick="setScale(48)">48</button>
        <button onclick="setScale(96)">96</button>
        <button onclick="setScale(128)">128</button>
        <button onclick="setScale(256)">256</button>
        <button onclick="setScale(512)">512</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')" id="btnGrid">Grid</button>
        <button onclick="setView('single')" id="btnSingle">Single</button>
        <button onclick="setView('versions')" id="btnVersions">Versions</button>
      </div>
      <button class="tb-btn" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="tb-btn" onclick="toggleDark()" id="btnDark">Dark</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="empty-state">Select an icon set to begin</div>
    </div>
  </div>
</div>

<div class="fs-toolbar" id="fsToolbar">
  <select id="fsSetSelect" onchange="fsSelectSet(this.value)"></select>
  <label style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Scale</label>
  <input type="range" class="scale-slider" id="fsScaleSlider" min="12" max="512" value="100">
  <span class="scale-value" id="fsScaleValue">100px</span>
  <div class="scale-presets">
    <button onclick="setScale(24)">24</button>
    <button onclick="setScale(48)">48</button>
    <button onclick="setScale(96)">96</button>
    <button onclick="setScale(256)">256</button>
    <button onclick="setScale(512)">512</button>
  </div>
  <button class="tb-btn" onclick="toggleDark()" id="btnDarkFs">Dark</button>
  <button class="fs-close" onclick="toggleFullscreen()" title="Exit (Esc)">&#215;</button>
</div>

<script>
let SETS = [];
let TIER_ORDER = [];
let activeSets = new Set();
let currentScale = 100;
let currentView = 'grid';
let singleIndex = 0;
let allVisibleIcons = [];
let searchFilter = '';
let sortMode = 'category'; // 'category' or 'name'
let selectedVariant = null; // specific variant in single view
let activeFilter = null; // null, 'color', or 'animated'
let appMode = 'icons'; // 'icons' or 'buttons'
let activeButtonCats = new Set(); // active button category indices
let buttonSingleIndex = 0; // current button index in single view
const likedIcons = new Set(); // stores liked icon identifiers (prefix:name)
const likedSets = new Set(['lucide', 'lucide-lab']); // liked icon set prefixes
const hiddenSets = new Set(); // hidden icon set prefixes
const iconCache = {}; // prefix -> [icon names]

async function loadCollections() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '<div class="empty-state">Loading collections...</div>';
  try {
    const res = await fetch('https://api.iconify.design/collections');
    const data = await res.json();
    // Build SETS from API data
    const sets = [];
    const categories = new Set();
    for (const [prefix, info] of Object.entries(data)) {
      const tier = info.category || 'Uncategorized';
      categories.add(tier);
      sets.push({
        id: prefix,
        prefix: prefix,
        name: info.name || prefix,
        tier: tier,
        count: info.total || 0,
        author: info.author?.name || '',
        license: info.license?.spdx || info.license?.title || '',
        sample: info.samples || [],
        palette: !!info.palette,
        animated: !!(info.tags && info.tags.includes('Contains Animations')),
        stroke: !!(info.tags && info.tags.includes('Uses Stroke')),
        tags: info.tags || [],
      });
    }
    // Sort by category then name
    TIER_ORDER = [...categories].sort();
    sets.sort((a, b) => {
      const ti = TIER_ORDER.indexOf(a.tier) - TIER_ORDER.indexOf(b.tier);
      if (ti !== 0) return ti;
      return a.name.localeCompare(b.name);
    });
    SETS = sets;
    document.querySelector('title').textContent = `Icon Sampler — ${SETS.length} Sets`;
    // Default to first set
    if (SETS.length) activeSets.add(SETS[0].id);
    buildFsSelect();
    renderSidebar();
    await renderCanvas();
    syncFsSelect();
  } catch (e) {
    canvas.innerHTML = '<div class="empty-state">Failed to load collections. Check network.</div>';
  }
}

function setMode(mode) {

    activeButtonCats.add(0);

  renderSidebar();
  renderCanvas();
  saveState();
}

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('btnSortCategory').classList.toggle('active', mode === 'category');
  document.getElementById('btnSortName').classList.toggle('active', mode === 'name');
  renderSidebar();
  saveState();
}

function renderSidebar() {
  const el = document.getElementById('setList');

  if (appMode === 'buttons') return renderButtonSidebar(el);

  // Restore icon-mode UI
  document.getElementById('searchInput').placeholder = 'Search sets...';
  document.querySelector('.sidebar-filters').style.display = '';
  document.querySelector('.sidebar-sort').style.display = '';

  let filtered = searchFilter
    ? SETS.filter(s => {
        if (s.name.toLowerCase().includes(searchFilter) || s.author.toLowerCase().includes(searchFilter) || s.tier.toLowerCase().includes(searchFilter)) return true;
        // Also match if any cached icon name contains the search term
        const cached = iconCache[s.prefix];
        if (cached) return cached.some(name => name.toLowerCase().includes(searchFilter));
        // Check sample icons as fallback
        return s.sample.some(name => name.toLowerCase().includes(searchFilter));
      })
    : [...SETS];

  // Apply type filter
  if (activeFilter === 'color') filtered = filtered.filter(s => s.palette);
  else if (activeFilter === 'animated') filtered = filtered.filter(s => s.animated);
  else if (activeFilter === 'stroke') filtered = filtered.filter(s => s.stroke);
  else if (activeFilter === 'emoji') filtered = filtered.filter(s => s.tier === 'Emoji');
  else if (activeFilter === 'logos') filtered = filtered.filter(s => s.tier === 'Logos');
  else if (activeFilter === 'flags') filtered = filtered.filter(s => s.tier === 'Flags / Maps');
  else if (activeFilter === 'material') filtered = filtered.filter(s => s.tier === 'Material');
  else if (activeFilter === 'liked') filtered = filtered.filter(s => likedSets.has(s.id));
  // Hide sets removed with -
  filtered = filtered.filter(s => !hiddenSets.has(s.id));

  if (sortMode === 'name') {
    filtered = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
  }

  let html = '';
  let lastTier = '';
  for (const s of filtered) {
    if (sortMode === 'category' && s.tier !== lastTier) {
      html += `<div class="tier-label">${s.tier}</div>`;
      lastTier = s.tier;
    }
    const active = activeSets.has(s.id) ? ' active' : '';
    const liked = likedSets.has(s.id) ? ' set-liked' : '';
    html += `<div class="set-item${active}" onclick="loadSet('${s.id}')">
      <div class="dot"></div>
      <div class="set-info"><div class="set-name">${s.name}</div></div>
      <div class="set-count">${s.count.toLocaleString()}</div>
      <div class="set-rate">
        <button class="${liked ? 'set-liked' : ''}" onclick="event.stopPropagation();rateSet('${s.id}','minus')" title="Hide set">&minus;</button>
        <button class="${liked}" onclick="event.stopPropagation();rateSet('${s.id}','plus')" title="${liked ? 'Unlike' : 'Like'}">&plus;</button>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderButtonSidebar(el) {
  let html = '';
  const visibleCats = [];
  BUTTON_CATALOG.forEach((cat, i) => {
    const catMatch = cat.category.toLowerCase().includes(searchFilter);
    const matchingBtns = searchFilter
      ? cat.buttons.filter(b => catMatch || b.label.toLowerCase().includes(searchFilter))
      : cat.buttons;
    if (searchFilter && matchingBtns.length === 0) return;
    visibleCats.push(i);
    const active = activeButtonCats.has(i) ? ' active' : '';
    const count = searchFilter ? matchingBtns.length : cat.buttons.length;
    html += `<div class="set-item${active}" onclick="loadButtonCat(${i})">
      <div class="dot"></div>
      <div class="set-info"><div class="set-name">${cat.category}</div></div>
      <div class="set-count">${count}</div>
    </div>`;
  });
  el.innerHTML = html;
  // Update search placeholder and hide icon-specific filters
  document.getElementById('searchInput').placeholder = 'Search buttons...';
  document.querySelector('.sidebar-filters').style.display = 'none';
  document.querySelector('.sidebar-sort').style.display = 'none';
}

function toggleFilter(type) {

function buildFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  let html = '<option value="__all__">All Sets</option>';
  let lastTier = '';
  for (const s of SETS) {
    if (s.tier !== lastTier) {
      if (lastTier) html += '</optgroup>';
      html += `<optgroup label="${s.tier}">`;
      lastTier = s.tier;
    }
    html += `<option value="${s.id}">${s.name} (${s.count.toLocaleString()})</option>`;
  }
  html += '</optgroup>';
  sel.innerHTML = html;
}

function syncFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  if (activeSets.size === SETS.length) sel.value = '__all__';
  else if (activeSets.size === 1) sel.value = [...activeSets][0];
}

function fsSelectSet(val) {
  if (val === '__all__') selectAll();
  else loadSet(val);
}

async function fetchIcons(prefix) {
  if (iconCache[prefix]) return iconCache[prefix];
  try {
    const res = await fetch(`https://api.iconify.design/collection?prefix=${prefix}`);
    const data = await res.json();
    let icons = [];
    if (data.uncategorized) icons = data.uncategorized;
    else if (data.categories) {
      for (const cat of Object.values(data.categories)) icons.push(...cat);
    }
    if (!icons.length && data.icons) icons = data.icons;
    iconCache[prefix] = icons;
    return icons;
  } catch {
    const s = SETS.find(s => s.prefix === prefix);
    return s ? s.sample : [];
  }
}

function getIcons(s) {
  const icons = iconCache[s.prefix] || s.sample;
  if (searchFilter) {
    return icons.filter(name => name.toLowerCase().includes(searchFilter));
  }
  return icons;
}

function getActiveButtonCats() {
  const cats = [];
  for (const idx of activeButtonCats) {
    if (BUTTON_CATALOG[idx]) cats.push({ idx, cat: BUTTON_CATALOG[idx] });
  }
  return cats;
}

function getAllVisibleButtons() {
  const result = [];
  // When searching, show from ALL matching categories; otherwise only active
  if (searchFilter) {
    BUTTON_CATALOG.forEach((cat, idx) => {
      const catMatch = cat.category.toLowerCase().includes(searchFilter);
      cat.buttons.forEach((b, bi) => {
        if (catMatch || b.label.toLowerCase().includes(searchFilter)) {
          result.push({ catIdx: idx, btnIdx: bi, btn: b, category: cat.category, dark: !!cat.dark });
        }
      });
    });
  } else {
    const cats = getActiveButtonCats();
    for (const { idx, cat } of cats) {
      cat.buttons.forEach((b, bi) => {
        result.push({ catIdx: idx, btnIdx: bi, btn: b, category: cat.category, dark: !!cat.dark });
      });
    }
  }
  return result;
}

function renderBtnHtml(b, size) {
  const loadingAfter = b.extra === 'loading' ? ';position:relative' : '';
  let inner = b.label;
  if (b.extra === 'loading') {
    inner += '<span style="display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;margin-left:8px;vertical-align:middle;animation:btn-spin 0.6s linear infinite"></span>';
  }
  const sizeStyle = size ? `;transform:scale(${size});transform-origin:center` : '';
  return `<button class="demo-btn" style="${b.style}${loadingAfter}${sizeStyle}">${inner}</button>`;
}

function renderButtonCanvas() {
  const canvas = document.getElementById('canvas');
  const allBtns = getAllVisibleButtons();

  if (currentView === 'single' || currentView === 'versions') {
    return renderButtonSingleView(canvas, allBtns);
  }

  // Grid view — show buttons from active categories
  canvas.style.overflowY = 'auto';
  canvas.style.overflowX = 'hidden';
  canvas.style.flexDirection = 'column';

  if (!allBtns.length) {
    canvas.innerHTML = '<div class="empty-state">Select a button category</div>';
    return;
  }

  // Group by category
  const groups = {};
  for (const b of allBtns) {
    if (!groups[b.catIdx]) groups[b.catIdx] = { category: b.category, dark: b.dark, buttons: [] };
    groups[b.catIdx].buttons.push(b);
  }

  let count = 0;
  canvas.innerHTML = Object.values(groups).map(g => {
    const darkBg = g.dark ? ' dark-bg' : '';
    count += g.buttons.length;
    return `<div class="btn-cat-section">
      <div class="btn-cat-header">${g.category} <span style="font-weight:400;color:#aaa">${g.buttons.length}</span></div>
      <div class="btn-cat-grid${darkBg}">${g.buttons.map((b, i) => {
        const globalIdx = allBtns.indexOf(b);
        const btnScale = currentScale / 48;
        return `<div style="cursor:pointer" onclick="openButtonSingle(${globalIdx})">${renderBtnHtml(b.btn, btnScale)}</div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
  canvas.insertAdjacentHTML('afterbegin',
    `<div style="font-size:12px;color:var(--muted);margin-bottom:16px">${count} button styles across ${Object.keys(groups).length} categories</div>`);
}

function renderButtonSingleView(canvas, allBtns) {
  canvas.style.overflowY = 'auto';
  canvas.style.overflowX = 'hidden';
  canvas.style.flexDirection = 'column';

  if (!allBtns.length) {
    canvas.innerHTML = '<div class="empty-state">No buttons to show</div>';
    return;
  }

  if (buttonSingleIndex >= allBtns.length) buttonSingleIndex = 0;
  if (buttonSingleIndex < 0) buttonSingleIndex = allBtns.length - 1;

  const c = allBtns[buttonSingleIndex];

  if (currentView === 'versions') {
    // Show all buttons in this category as a grid
    const catBtns = allBtns.filter(b => b.catIdx === c.catIdx);
    canvas.innerHTML = `<div class="single-view">
      <div class="single-set-name">${c.category}</div>
      <div class="versions-grid" style="max-width:${Math.max(900, (currentScale * 2 + 40) * 4)}px">${catBtns.map((b, i) => {
        const globalIdx = allBtns.indexOf(b);
        const isCurrent = globalIdx === buttonSingleIndex;
        const btnScale = currentScale / 48;
        return `<div class="version-card${isCurrent ? ' current' : ''}" onclick="openButtonSingle(${globalIdx})" style="${isCurrent ? 'background:var(--hover)' : ''}">
          ${renderBtnHtml(b.btn, btnScale)}
          <div class="version-label" title="${b.btn.label}">${b.btn.label}</div>
        </div>`;
      }).join('')}</div>
      <div class="single-icon-name">${catBtns.length} style${catBtns.length !== 1 ? 's' : ''} in category</div>
      <div class="single-nav">
        <button onclick="navButtonSingle(-1)">&larr; Prev</button>
        <span class="single-icon-name">${buttonSingleIndex + 1} / ${allBtns.length}</span>
        <button onclick="navButtonSingle(1)">Next &rarr;</button>
      </div>
    </div>`;
    return;
  }

  // Single view — show one button large with a dark/light backdrop as appropriate
  const bgStyle = c.dark ? 'background:#1a1a2e;padding:60px;border-radius:16px' : '';
  const scaleFactor = Math.max(currentScale / 48, 1.5); // scale button relative to slider
  canvas.innerHTML = `<div class="single-view">
    <div class="single-set-name">${c.category}</div>
    <div style="${bgStyle};display:flex;align-items:center;justify-content:center">
      ${renderBtnHtml(c.btn, scaleFactor)}
    </div>
    <div class="single-icon-name" style="font-size:12px;margin-top:8px">${c.btn.label}</div>
    <div style="font-size:10px;color:var(--muted);max-width:500px;word-break:break-all;text-align:center;margin-top:4px">${c.btn.style}</div>
    <div class="single-nav" style="margin-top:16px">
      <button onclick="navButtonSingle(-1)">&larr; Prev</button>
      <span class="single-icon-name">${buttonSingleIndex + 1} / ${allBtns.length}</span>
      <button onclick="navButtonSingle(1)">Next &rarr;</button>
    </div>
  </div>`;
}

function openButtonSingle(idx) {
  buttonSingleIndex = idx;
  currentView = 'single';
  setView('single');
}

function navButtonSingle(dir) {
  buttonSingleIndex += dir;
  renderCanvas();
}

async function renderCanvas() {
  const canvas = document.getElementById('canvas');

  if (appMode === 'buttons') return renderButtonCanvas();

  // Search results scroll vertically; normal view scrolls horizontally
  if (searchFilter) {
    canvas.style.overflowY = 'auto';
    canvas.style.overflowX = 'hidden';
    canvas.style.flexDirection = 'column';
  } else {
    canvas.style.overflowY = 'hidden';
    canvas.style.overflowX = 'auto';
    canvas.style.flexDirection = '';
  }

  // When searching, show matching icons from ALL sets (fetched on demand)
  // When not searching, show only the active/selected set(s)
  let displaySets;
  if (searchFilter) {
    // Show sets that have matching icons (from sidebar's filtered list)
    displaySets = SETS.filter(s => {
      if (hiddenSets.has(s.id)) return false;
      // Apply type filter
      if (activeFilter === 'color' && !s.palette) return false;
      if (activeFilter === 'animated' && !s.animated) return false;
      if (activeFilter === 'stroke' && !s.stroke) return false;
      if (activeFilter === 'emoji' && s.tier !== 'Emoji') return false;
      if (activeFilter === 'logos' && s.tier !== 'Logos') return false;
      if (activeFilter === 'material' && s.tier !== 'Material') return false;
      if (activeFilter === 'liked' && !likedSets.has(s.id)) return false;
      // Check if set name/author matches OR if cached icons match
      if (s.name.toLowerCase().includes(searchFilter) || s.author.toLowerCase().includes(searchFilter)) return true;
      const cached = iconCache[s.prefix];
      if (cached) return cached.some(name => name.toLowerCase().includes(searchFilter));
      return s.sample.some(name => name.toLowerCase().includes(searchFilter));
    });
  } else {
    displaySets = SETS.filter(s => activeSets.has(s.id));
  }

  if (!displaySets.length) {
    canvas.innerHTML = '<div class="empty-state">Select an icon set to begin</div>';
    return;
  }

  // Split into cached (render now) and uncached (fetch progressively)
  const cached = displaySets.filter(s => iconCache[s.prefix]);
  const uncached = displaySets.filter(s => !iconCache[s.prefix]);

  // For non-search mode, fetch all needed sets before rendering
  if (!searchFilter && uncached.length) {
    canvas.innerHTML = '<div class="empty-state">Loading icons...</div>';
    await Promise.all(uncached.map(s => fetchIcons(s.prefix)));
    displaySets = displaySets.filter(s => getIcons(s).length > 0);
  }

  // For search mode, render cached results immediately, then stream uncached
  if (searchFilter) {
    // Filter cached sets to only those with actual matches
    const readySets = cached.filter(s => getIcons(s).length > 0);
    if (currentView === 'single' || currentView === 'versions') {
      // For single/versions, wait for all to load first
      if (uncached.length) await Promise.all(uncached.map(s => fetchIcons(s.prefix)));
      displaySets = displaySets.filter(s => getIcons(s).length > 0);
      return renderSingleView(canvas, displaySets);
    }
    // Render what we have now
    renderIconGrid(canvas, readySets);
    // Fetch uncached sets progressively and append results
    if (uncached.length) {
      const currentSearch = searchFilter; // capture to detect stale renders
      for (const s of uncached) {
        await fetchIcons(s.prefix);
        if (searchFilter !== currentSearch) return; // search changed, abort
        const icons = getIcons(s);
        if (icons.length > 0) appendSetToCanvas(canvas, s, icons);
      }
    }
    return;
  }

  if (currentView === 'single' || currentView === 'versions') return renderSingleView(canvas, displaySets);
  renderIconGrid(canvas, displaySets);
}

function buildSetHtml(s, gridStyle, cellSize) {
  const names = getIcons(s);
  if (!names.length) return { html: '', icons: [] };
  const icons = names.map(n => ({ icon: `${s.prefix}:${n}`, set: s.name, prefix: s.prefix }));
  const html = `<div class="set-section" data-prefix="${s.prefix}">
    <div class="set-section-header">
      <span class="set-section-title">${s.name}</span>
      <span class="set-section-count">${icons.length.toLocaleString()} icons · ${s.license}</span>
      <span class="set-section-author">${s.author}</span>
    </div>
    <div class="icon-grid" style="${gridStyle}">${icons.map(ic => {
      return `<div class="icon-cell" style="width:${cellSize}px" data-icon="${ic.icon}">
        <iconify-icon icon="${ic.icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
        <div class="tooltip">${ic.icon}</div>
      </div>`;
    }).join('')}</div>
  </div>`;
  return { html, icons };
}

function renderIconGrid(canvas, sets) {
  const cellSize = Math.max(currentScale + 8, 28);
  const gridStyle = searchFilter
    ? 'flex-direction:row;align-content:flex-start;max-height:none'
    : '';

  allVisibleIcons = [];
  const parts = [];
  for (const s of sets) {
    const { html, icons } = buildSetHtml(s, gridStyle, cellSize);
    if (html) {
      parts.push(html);
      icons.forEach(ic => allVisibleIcons.push(ic));
    }
  }
  canvas.innerHTML = parts.join('');
  rebindIconClicks();
  animateIcons();
}

function appendSetToCanvas(canvas, s) {
  const cellSize = Math.max(currentScale + 8, 28);
  const gridStyle = 'flex-direction:row;align-content:flex-start;max-height:none';
  const { html, icons } = buildSetHtml(s, gridStyle, cellSize);
  if (!html) return;
  icons.forEach(ic => allVisibleIcons.push(ic));
  canvas.insertAdjacentHTML('beforeend', html);
  rebindIconClicks();
  animateIcons();
}

function rebindIconClicks() {
  // Re-bind click handlers based on current allVisibleIcons order
  document.querySelectorAll('.icon-cell[data-icon]').forEach(cell => {
    const icon = cell.dataset.icon;
    const idx = allVisibleIcons.findIndex(ic => ic.icon === icon);
    if (idx !== -1) cell.onclick = () => openSingle(idx);
  });
}

function getVariants(baseName, icons) {
  return icons.filter(ic => {
    const name = ic.icon.split(':')[1];
    return iconBaseName(name) === baseName;
  });
}

function getUniqueBaseIcons(icons) {
  const seen = new Set();
  const result = [];
  for (const ic of icons) {
    const base = iconBaseName(ic.icon.split(':')[1]);
    if (!seen.has(base)) {
      seen.add(base);
      result.push(ic);
    }
  }
  return result;
}

function renderSingleView(canvas, active) {
  allVisibleIcons = [];
  active.forEach(s => {
    const names = getIcons(s);
    names.forEach(n => {
      const fullIcon = `${s.prefix}:${n}`;
      if (!hiddenIcons.has(fullIcon)) allVisibleIcons.push({ icon: fullIcon, set: s.name, prefix: s.prefix });
    });
  });
  if (!allVisibleIcons.length) return;

  // For single/versions, navigate by unique base icons
  const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
  if (singleIndex >= uniqueIcons.length) singleIndex = 0;
  if (singleIndex < 0) singleIndex = uniqueIcons.length - 1;

  const baseIcon = uniqueIcons[singleIndex];
  const baseName = iconBaseName(baseIcon.icon.split(':')[1]);
  const variants = getVariants(baseName, allVisibleIcons);
  // Use selected variant if it matches current base, otherwise use base icon
  const c = (selectedVariant && iconBaseName(selectedVariant.split(':')[1]) === baseName)
    ? (allVisibleIcons.find(ic => ic.icon === selectedVariant) || baseIcon)
    : baseIcon;
  const sz = Math.max(currentScale, 500);
  const isLiked = likedIcons.has(c.icon);
  const rateHtml = `<button class="rate-btn minus" onclick="rateIcon('${c.icon}','minus')" title="${isLiked ? 'Remove from likes' : 'Hide from view'}">&minus;</button>
    <button class="rate-btn plus${isLiked ? ' liked' : ''}" onclick="rateIcon('${c.icon}','plus')" title="${isLiked ? 'Unlike' : 'Like'}">&plus;</button>`;

  if (currentView === 'versions') {
    // Full versions view — all variants displayed larger
    canvas.innerHTML = `<div class="single-view">
      <div class="single-set-name">${c.set}</div>
      <div class="single-icon-name" style="font-size:13px;font-weight:600;margin-bottom:8px">${baseName}</div>
      <div class="versions-grid" style="max-width:${Math.max(700, (currentScale + 40) * 5)}px">${variants.map((v, i) => {
        const vName = v.icon.split(':')[1];
        const suffix = vName.replace(baseName, '').replace(/^-/, '') || 'default';
        return `<div class="version-card" onclick="selectVariant('${v.icon}')">
          <iconify-icon icon="${v.icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
          <div class="version-label" title="${vName}">${suffix}</div>
        </div>`;
      }).join('')}</div>
      <div class="single-icon-name">${variants.length} variant${variants.length !== 1 ? 's' : ''}</div>
      <div class="single-nav">
        ${rateHtml}
        <button onclick="navSingle(-1)">&larr; Prev</button>
        <span class="single-icon-name">${singleIndex + 1} / ${uniqueIcons.length}</span>
        <button onclick="navSingle(1)">Next &rarr;</button>
      </div>
    </div>`;
    return;
  }

  // Single view with variant line below
  const variantHtml = variants.length > 1 ? `<div class="variant-line">${variants.map(v => {
    const isCurrent = v.icon === c.icon;
    return `<div class="variant-icon${isCurrent ? ' current' : ''}" onclick="selectVariant('${v.icon}')" title="${v.icon.split(':')[1]}">
      <iconify-icon icon="${v.icon}" width="20" height="20"></iconify-icon>
    </div>`;
  }).join('')}</div>` : '';

  canvas.innerHTML = `<div class="single-view">
    <div class="single-set-name">${c.set}</div>
    <div class="single-icon-display">
      <iconify-icon icon="${c.icon}" width="${sz}" height="${sz}"></iconify-icon>
    </div>
    <div class="single-icon-name">${c.icon}</div>
    ${variantHtml}
    <div class="single-nav">
      ${rateHtml}
      <button onclick="navSingle(-1)">&larr; Prev</button>
      <span class="single-icon-name">${singleIndex + 1} / ${uniqueIcons.length}</span>
      <button onclick="navSingle(1)">Next &rarr;</button>
    </div>
  </div>`;
}

function animateIcons() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const cell = entry.target;
        const delay = parseInt(cell.dataset.delay) || 0;
        setTimeout(() => cell.classList.add('visible'), delay);
        observer.unobserve(cell);
      }
    });
  }, { rootMargin: '400px' });

  document.querySelectorAll('.icon-cell:not(.visible)').forEach((cell, i) => {
    cell.dataset.delay = Math.min(i % 40, 15) * 6;
    observer.observe(cell);
  });
}

function navSingle(dir) { singleIndex += dir; selectedVariant = null; renderCanvas(); }

function openSingle(idx) {
  // Convert grid index to unique base icon index
  if (allVisibleIcons.length) {
    const targetIcon = allVisibleIcons[idx];
    if (targetIcon) {
      const baseName = iconBaseName(targetIcon.icon.split(':')[1]);
      const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
      const baseIdx = uniqueIcons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
      singleIndex = baseIdx !== -1 ? baseIdx : 0;
    }
  }
  currentView = 'single';
  setView('single');
}

const hiddenIcons = new Set(); // icons removed with -

function rateSet(id, action) {
  if (action === 'plus') {
    hiddenSets.delete(id);
    if (likedSets.has(id)) likedSets.delete(id);
    else likedSets.add(id);
  } else {
    if (likedSets.has(id)) likedSets.delete(id);
    else hiddenSets.add(id);
  }
  renderSidebar();
  saveState();
}

function rateIcon(iconId, action) {
  if (action === 'plus') {
    hiddenIcons.delete(iconId);
    if (likedIcons.has(iconId)) likedIcons.delete(iconId);
    else likedIcons.add(iconId);
  } else {
    // minus: if liked, remove from likes; otherwise hide from view
    if (likedIcons.has(iconId)) likedIcons.delete(iconId);
    else { hiddenIcons.add(iconId); saveState(); navSingle(1); return; }
  }
  renderCanvas();
  saveState();
}

function selectVariant(fullIcon) {
  // Find which base icon this variant belongs to and update singleIndex
  const baseName = iconBaseName(fullIcon.split(':')[1]);
  const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
  const baseIdx = uniqueIcons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
  if (baseIdx !== -1) singleIndex = baseIdx;
  // In single view, switch the displayed icon to this variant
  // We need to store which variant is selected
  selectedVariant = fullIcon;
  renderCanvas();
}

// Strip variant suffixes to get a base icon name for cross-set matching
function iconBaseName(name) {
  return name
    .replace(/-(thin|light|bold|duotone|fill|filled|solid|outline|outlined|regular|sharp|twotone|broken|linear|bulk)$/g, '')
    .replace(/-(12|16|20|24|32|48)$/g, '')
    .replace(/-alt\d*$/g, '');
}

function findIconMatch(iconName, icons) {
  const baseName = iconBaseName(iconName);
  if (baseName.length < 2) return -1;
  // Exact match
  let idx = icons.findIndex(ic => ic.icon.split(':')[1] === iconName);
  // Base name match
  if (idx === -1) idx = icons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
  // Candidate contains our base name (not reverse — too loose)
  if (idx === -1 && baseName.length >= 3) idx = icons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]).includes(baseName));
  return idx;
}

async function navSet(dir) {
  const visible = searchFilter
    ? SETS.filter(s => s.name.toLowerCase().includes(searchFilter) || s.author.toLowerCase().includes(searchFilter) || s.tier.toLowerCase().includes(searchFilter))
    : SETS;
  if (!visible.length) return;
  const currentId = activeSets.size === 1 ? [...activeSets][0] : null;

  // Remember current icon name for cross-set matching in single view
  let matchIconName = null;
  if (currentView === 'single' && currentId && allVisibleIcons.length) {
    const cur = allVisibleIcons[singleIndex];
    if (cur) matchIconName = cur.icon.split(':')[1];
  }

  let startIdx = currentId ? visible.findIndex(s => s.id === currentId) : -1;
  let idx = startIdx;

  // If in single view with a match name, skip sets that don't have it
  if (matchIconName && currentView === 'single') {
    const maxTries = visible.length;
    for (let tries = 0; tries < maxTries; tries++) {
      idx += dir;
      if (idx < 0) idx = visible.length - 1;
      if (idx >= visible.length) idx = 0;
      if (idx === startIdx) break; // wrapped around, no match anywhere
      await loadSet(visible[idx].id);
      const matchIdx = findIconMatch(matchIconName, allVisibleIcons);
      if (matchIdx !== -1) {
        singleIndex = matchIdx;
        renderCanvas();
        break;
      }
    }
  } else {
    idx += dir;
    if (idx < 0) idx = visible.length - 1;
    if (idx >= visible.length) idx = 0;
    await loadSet(visible[idx].id);
  }

  // Scroll active item into view
  const el = document.querySelector('.set-item.active');
  if (el) el.scrollIntoView({ block: 'nearest' });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (document.body.classList.contains('fullscreen')) toggleFullscreen(); return; }
  const inInput = e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT';
  // Allow ↑↓ arrow keys even when search input is focused
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    const dir = e.key === 'ArrowUp' ? -1 : 1;
    appMode === 'buttons' ? navButtonCat(dir) : navSet(dir);
    return;
  }
  if (inInput) return;
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'd' || e.key === 'D') toggleDark();
  if (e.key === 'ArrowLeft') { e.preventDefault(); appMode === 'buttons' ? navButtonSingle(-1) : navSingle(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); appMode === 'buttons' ? navButtonSingle(1) : navSingle(1); }
  if (e.key === ' ') {
    e.preventDefault();
    if (currentView === 'grid') setView('single');
    else if (currentView === 'single') setView('versions');
    else if (currentView === 'versions') setView('grid');
  }
});

function navButtonCat(dir) {
  // Build filtered list of category indices
  const cats = [];
  BUTTON_CATALOG.forEach((cat, i) => {
    if (searchFilter) {
      const catMatch = cat.category.toLowerCase().includes(searchFilter);
      const hasMatch = cat.buttons.some(b => catMatch || b.label.toLowerCase().includes(searchFilter));
      if (!hasMatch) return;
    }
    cats.push(i);
  });
  if (!cats.length) return;
  const currentIdx = activeButtonCats.size === 1 ? [...activeButtonCats][0] : -1;
  let pos = cats.indexOf(currentIdx);
  pos += dir;
  if (pos < 0) pos = cats.length - 1;
  if (pos >= cats.length) pos = 0;
  loadButtonCat(cats[pos]);
  const el = document.querySelector('.set-item.active');
  if (el) el.scrollIntoView({ block: 'nearest' });
}

// Resize handle
const resizeHandle = document.getElementById('resizeHandle');
const sidebar = document.querySelector('.sidebar');
let isResizing = false;

resizeHandle.addEventListener('mousedown', e => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const w = Math.min(500, Math.max(180, e.clientX));
  sidebar.style.width = w + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizeHandle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  saveState();
});

// Pinch-to-zoom and scroll remapping on canvas
let singleScrollAccum = 0;
let singleScrollTimer = null;
document.getElementById('canvas').addEventListener('wheel', e => {
  if (e.ctrlKey) {
    e.preventDefault();
    const factor = 1 - e.deltaY * 0.01;
    currentScale = Math.round(Math.min(512, Math.max(12, currentScale * factor)));
    updateScale();
    return;
  }
  // In single/versions view, scroll navigates between icons/buttons
  if (currentView === 'single' || currentView === 'versions') {
    e.preventDefault();
    singleScrollAccum += e.deltaY + e.deltaX;
    if (!singleScrollTimer) {
      singleScrollTimer = setTimeout(() => {
        if (Math.abs(singleScrollAccum) > 30) {
          const d = singleScrollAccum > 0 ? 1 : -1;
          appMode === 'buttons' ? navButtonSingle(d) : navSingle(d);
        }
        singleScrollAccum = 0;
        singleScrollTimer = null;
      }, 80);
    }
    return;
  }
  // When searching or in buttons grid, allow native vertical scroll
  if (searchFilter || appMode === 'buttons') return;
  // Map vertical scroll to horizontal on canvas
  const canvas = document.getElementById('canvas');
  e.preventDefault();
  canvas.scrollLeft += e.deltaY + e.deltaX;
}, { passive: false });

// Persist state to disk (prefs.json) and localStorage as fallback
const STORAGE_KEY = 'icon-sampler-state';

function buildState() {
  return {
    scale: currentScale,
    view: currentView,
    sortMode,
    activeFilter,
    appMode,
    dark: document.body.classList.contains('dark'),
    liked: [...likedIcons],
    hidden: [...hiddenIcons],
    likedSets: [...likedSets],
    hiddenSets: [...hiddenSets],
    activeSet: activeSets.size === 1 ? [...activeSets][0] : null,
    activeButtonCat: activeButtonCats.size === 1 ? [...activeButtonCats][0] : null,
    sidebarWidth: sidebar.style.width || null,
  };
}

let saveTimer = null;
function saveState() {
  const state = buildState();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  // Debounce disk writes to avoid hammering on rapid changes
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch('/prefs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    }).catch(() => {}); // silent fail if server not available
  }, 300);
}

function applyState(s) {
  if (s.scale) { currentScale = s.scale; updateScale(); }
  if (s.view) setView(s.view);
  if (s.sortMode) setSortMode(s.sortMode);
  if (s.activeFilter) toggleFilter(s.activeFilter);
  if (s.appMode) setMode(s.appMode);
  if (s.dark) toggleDark();
  if (s.liked) s.liked.forEach(id => likedIcons.add(id));
  if (s.hidden) s.hidden.forEach(id => hiddenIcons.add(id));
  if (s.likedSets) { likedSets.clear(); s.likedSets.forEach(id => likedSets.add(id)); }
  if (s.hiddenSets) s.hiddenSets.forEach(id => hiddenSets.add(id));
  if (s.activeSet) { activeSets.clear(); activeSets.add(s.activeSet); }
  if (s.activeButtonCat != null) { activeButtonCats.clear(); activeButtonCats.add(s.activeButtonCat); }
  if (s.sidebarWidth) sidebar.style.width = s.sidebarWidth;
}

async function restoreState() {
  // Try disk first (prefs.json), fall back to localStorage
  try {
    const res = await fetch('/prefs');
    if (res.ok) {
      const s = await res.json();
      if (s && Object.keys(s).length > 0) { applyState(s); return; }
    }
  } catch {}
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) applyState(JSON.parse(raw));
  } catch {}
}

restoreState().then(() => loadCollections());
</script>
