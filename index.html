<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Sampler</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f5f5f5;
    --accent: #000;
    --sidebar-w: 260px;
    --topbar-h: 52px;
  }

  body.dark {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --hover: #1a1a1a;
    --accent: #e8e8e8;
  }

  body.dark iconify-icon { color: var(--fg); }
  body.dark .scale-slider { background: var(--border); }
  body.dark .scale-slider::-webkit-slider-thumb { background: var(--fg); }

  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .sidebar-header p {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
  }

  .set-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .set-list::-webkit-scrollbar { width: 4px; }
  .set-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .set-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .set-item:hover { background: var(--hover); }
  .set-item.active { background: var(--fg); color: var(--bg); }

  .set-item .check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
    transition: all 0.1s;
  }

  .set-item.active .check {
    border-color: var(--bg);
    background: var(--bg);
    color: var(--fg);
  }

  .set-info { flex: 1; min-width: 0; }

  .set-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .set-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .set-item.active .set-meta { color: rgba(255,255,255,0.6); }

  .sidebar-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .sidebar-actions button {
    flex: 1;
    padding: 6px 0;
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    background: var(--fg);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .sidebar-actions button:hover { opacity: 0.8; }
  .sidebar-actions button.secondary {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
  }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Topbar */
  .topbar {
    height: var(--topbar-h);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
  }

  .topbar label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scale-slider {
    width: 160px;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
  }

  .scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
  }

  .scale-value {
    font-size: 12px;
    font-weight: 500;
    min-width: 40px;
    font-variant-numeric: tabular-nums;
  }

  .scale-presets {
    display: flex;
    gap: 4px;
    margin-left: 4px;
  }

  .scale-presets button {
    padding: 3px 8px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .scale-presets button:hover,
  .scale-presets button.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .view-toggle {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  .view-toggle button {
    padding: 5px 10px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .view-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .view-toggle button:last-child { border-radius: 0 4px 4px 0; }
  .view-toggle button + button { border-left: none; }

  .view-toggle button.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .tb-btn {
    padding: 5px 10px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .tb-btn:hover {
    background: var(--fg);
    color: var(--bg);
  }

  /* Canvas */
  .canvas {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  .canvas::-webkit-scrollbar { width: 6px; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Set section in canvas */
  .set-section {
    margin-bottom: 40px;
  }

  .set-section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .set-section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .set-section-count {
    font-size: 11px;
    color: var(--muted);
  }

  .set-section-desc {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  /* Icon grid */
  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }

  .icon-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    border-radius: 4px;
    transition: background 0.1s;
    cursor: default;
    position: relative;
  }

  .icon-cell:hover {
    background: var(--hover);
  }

  .icon-cell iconify-icon {
    display: block;
  }

  /* Tooltip */
  .icon-cell .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--fg);
    color: var(--bg);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }

  .icon-cell:hover .tooltip { display: block; }

  /* Single view */
  .single-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    gap: 32px;
    text-align: center;
  }

  .single-icon-display {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .single-icon-display iconify-icon {
    display: block;
  }

  .single-nav {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .single-nav button {
    padding: 8px 20px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .single-nav button:hover {
    background: var(--fg);
    color: var(--bg);
  }

  .single-icon-name {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  .single-set-name {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  /* Fullscreen mode */
  body.fullscreen .sidebar { display: none; }
  body.fullscreen .topbar { display: none; }
  body.fullscreen .canvas { padding: 0; }
  body.fullscreen .icon-grid { gap: 0; }
  body.fullscreen .icon-cell { border-radius: 0; }
  body.fullscreen .set-section { margin-bottom: 0; }
  body.fullscreen .set-section-header { display: none; }

  /* Fullscreen floating toolbar */
  .fs-toolbar {
    display: none;
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    gap: 12px;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    transition: opacity 0.2s;
  }

  body.fullscreen .fs-toolbar { display: flex; }

  .fs-toolbar .scale-slider { width: 120px; }

  .fs-toolbar select {
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    outline: none;
  }

  .fs-close {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    font-size: 16px;
    font-family: inherit;
    line-height: 1;
    transition: all 0.1s;
  }

  .fs-close:hover {
    background: var(--fg);
    color: var(--bg);
  }

  .fs-toolbar .scale-presets { margin-left: 0; }

  /* Loading */
  .loading-msg {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 60px 20px;
  }

  /* Empty */
  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 13px;
  }

  /* Keyboard hint */
  .keyboard-hint {
    padding: 8px 16px;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  kbd {
    display: inline-block;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--hover);
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Icon Sampler</h1>
      <p>High-design icon sets for sampling and comparison</p>
    </div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-actions">
      <button class="secondary" onclick="selectNone()">None</button>
      <button onclick="selectAll()">All</button>
    </div>
    <div class="keyboard-hint">
      <kbd>F</kbd> Fullscreen &nbsp; <kbd>D</kbd> Dark mode &nbsp; <kbd>←</kbd><kbd>→</kbd> Nav single &nbsp; <kbd>Esc</kbd> Exit
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <label>Scale</label>
      <input type="range" class="scale-slider" id="scaleSlider" min="12" max="512" value="24">
      <span class="scale-value" id="scaleValue">24px</span>
      <div class="scale-presets">
        <button onclick="setScale(16)">16</button>
        <button onclick="setScale(24)" class="active">24</button>
        <button onclick="setScale(48)">48</button>
        <button onclick="setScale(96)">96</button>
        <button onclick="setScale(128)">128</button>
        <button onclick="setScale(256)">256</button>
        <button onclick="setScale(512)">512</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')" id="btnGrid">Grid</button>
        <button onclick="setView('single')" id="btnSingle">Single</button>
      </div>
      <button class="tb-btn" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="tb-btn" onclick="toggleDark()" id="btnDark">Dark</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="empty-state">Select one or more icon sets to begin</div>
    </div>
  </div>
</div>

<!-- Fullscreen floating toolbar -->
<div class="fs-toolbar" id="fsToolbar">
  <select id="fsSetSelect" onchange="fsSelectSet(this.value)"></select>
  <label style="font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Scale</label>
  <input type="range" class="scale-slider" id="fsScaleSlider" min="12" max="512" value="24">
  <span class="scale-value" id="fsScaleValue">24px</span>
  <div class="scale-presets">
    <button onclick="setScale(24)">24</button>
    <button onclick="setScale(48)">48</button>
    <button onclick="setScale(96)">96</button>
    <button onclick="setScale(256)">256</button>
    <button onclick="setScale(512)">512</button>
  </div>
  <button class="tb-btn" onclick="toggleDark()" id="btnDarkFs">Dark</button>
  <button class="fs-close" onclick="toggleFullscreen()" title="Exit fullscreen (Esc)">&#215;</button>
</div>

    sample: ['heart-outline','home-outline','settings-2-outline','search-outline','email-outline','bell-outline','person-outline','star-outline','camera-outline','message-circle-outline','flash-outline','globe-outline','headphones-outline','book-outline','paper-plane-outline','brush-outline','scissors-outline','cloud-upload-outline','award-outline','compass-outline','eye-outline','flag-outline','gift-outline','lock-outline','map-outline','moon-outline','sun-outline','phone-outline','shield-outline','pin-outline','umbrella-outline','activity-outline','pantone-outline','close-circle-outline','clock-outline','navigation-outline','archive-outline','arrow-forward-outline','arrow-back-outline','battery-outline','bluetooth-outline','cast-outline','code-outline','calendar-outline','cube-outline']
  },
  {
    id: 'akar', prefix: 'akar-icons', name: 'Akar Icons',
    desc: 'Perfectly rounded terminals. Friendly, consistent radii.',
    count: 454, license: 'MIT',
    sample: ['heart','home','gear','search','envelope','bell','person','star','camera','chat-bubble','thunder','globe','music-note','book','paper-airplane','scissor','cloud','trophy','compass','crown','diamond','eye-open','flag','gift','key','leaf','location','moon','sun','phone','shield','tag','umbrella','graph','circle-x','alarm','air','arrow-right','arrow-left','battery-full','bluetooth','calendar','calculator','chat-question','circle-check','clipboard','copy','download','file','folder']
  },
  {
    id: 'mono', prefix: 'mi', name: 'Mono Icons',
    desc: 'By Mono Company (Belgian studio). Restrained, purposeful.',
    count: 136, license: 'MIT',
    sample: ['heart','home','settings','search','mail','bell','user','star','camera','message','flash','globe','music','book','send','edit','scissors','cloud','flag','eye','gift','key','moon','sun','phone','shield','tag','clock','activity','lock','arrow-right','arrow-left','calendar','code','download','upload','folder','print','refresh','trash','attachment','filter','link','log-out','menu','notification','pin','sort','zoom-in','zoom-out']
  },
  {
    id: 'unicons', prefix: 'uil', name: 'Unicons',
    desc: 'By IconScout. 1200+ clean line icons, well-balanced weight.',
    count: 1215, license: 'Apache 2.0',
    sample: ['heart','home-alt','setting','search','envelope','bell','user','star','camera','comment','bolt','globe','music','book-open','message','brush-alt','scissors','cloud','trophy','compass','eye','flag-alt','gift','key-skeleton','leaf','map-marker','moon','sun','phone','shield','tag','trees','umbrella','graph-bar','times-circle','clock','navigation','anchor','archive','arrow-right','arrow-left','battery-bolt','bluetooth-b','broadcast','bug','calculator','calendar-alt','chart','cloud-download','code-branch']
  }
];

let activeSets = new Set(['phosphor']);
let currentScale = 24;
let currentView = 'grid';
let singleIndex = 0;
let allVisibleIcons = [];

// Build sidebar
function renderSidebar() {
  const el = document.getElementById('setList');
  el.innerHTML = SETS.map((s, i) => `
    <div class="set-item ${activeSets.has(s.id) ? 'active' : ''}" data-id="${s.id}" onclick="loadSet('${s.id}')">
      <div class="check">${activeSets.has(s.id) ? '✓' : ''}</div>
      <div class="set-info">
        <div class="set-name">${s.name}</div>
        <div class="set-meta">${s.count} icons · ${s.license}</div>
      </div>
    </div>
  `).join('');
}

// Click sidebar = load that set exclusively
function loadSet(id) {
  activeSets.clear();
  activeSets.add(id);
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

function selectAll() {
  SETS.forEach(s => activeSets.add(s.id));
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

function selectNone() {
  activeSets.clear();
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

// Scale
const slider = document.getElementById('scaleSlider');
const fsSlider = document.getElementById('fsScaleSlider');

slider.addEventListener('input', () => {
  currentScale = parseInt(slider.value);
  updateScale();
});

fsSlider.addEventListener('input', () => {
  currentScale = parseInt(fsSlider.value);
  updateScale();
});

function setScale(v) {
  currentScale = v;
  slider.value = v;
  fsSlider.value = v;
  updateScale();
}

function updateScale() {
  slider.value = currentScale;
  fsSlider.value = currentScale;
  document.getElementById('scaleValue').textContent = currentScale + 'px';
  document.getElementById('fsScaleValue').textContent = currentScale + 'px';
  document.querySelectorAll('.scale-presets button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === currentScale);
  });
  renderCanvas();
}

// View
function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnSingle').classList.toggle('active', v === 'single');
  singleIndex = 0;
  renderCanvas();
}

// Fullscreen
function toggleFullscreen() {
  document.body.classList.toggle('fullscreen');
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('btnDark').textContent = isDark ? 'Light' : 'Dark';
  document.getElementById('btnDarkFs').textContent = isDark ? 'Light' : 'Dark';
}

// Fullscreen set selector
function buildFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  sel.innerHTML = '<option value="__all__">All Sets</option>' +
    SETS.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

function syncFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  if (activeSets.size === SETS.length) {
    sel.value = '__all__';
  } else if (activeSets.size === 1) {
    sel.value = [...activeSets][0];
  } else {
    sel.value = '__all__';
  }
}

function fsSelectSet(val) {
  if (val === '__all__') {
    selectAll();
  } else {
    loadSet(val);
  }
}

// Canvas
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  const active = SETS.filter(s => activeSets.has(s.id));

  if (active.length === 0) {
    canvas.innerHTML = '<div class="empty-state">Select one or more icon sets to begin</div>';
    return;
  }

  if (currentView === 'single') {
    renderSingleView(canvas, active);
    return;
  }

  // Grid view
  const cellSize = Math.max(currentScale + 12, 32);

  canvas.innerHTML = active.map(s => {
    const icons = buildIconList(s);
    return `
      <div class="set-section">
        <div class="set-section-header">
          <span class="set-section-title">${s.name}</span>
          <span class="set-section-count">${icons.length} icons</span>
          <span class="set-section-desc">${s.desc}</span>
        </div>
        <div class="icon-grid">
          ${icons.map(icon => `
            <div class="icon-cell" style="width:${cellSize}px">
              <iconify-icon icon="${icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
              <div class="tooltip">${icon}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function buildIconList(s) {
  return s.sample.map(name => `${s.prefix}:${name}`);
}

function renderSingleView(canvas, active) {
  allVisibleIcons = [];
  active.forEach(s => {
    const icons = buildIconList(s);
    icons.forEach(icon => allVisibleIcons.push({ icon, set: s.name }));
  });

  if (allVisibleIcons.length === 0) return;
  if (singleIndex >= allVisibleIcons.length) singleIndex = 0;
  if (singleIndex < 0) singleIndex = allVisibleIcons.length - 1;

  const current = allVisibleIcons[singleIndex];
  const displaySize = Math.max(currentScale * 3, 64);

  canvas.innerHTML = `
    <div class="single-view">
      <div class="single-set-name">${current.set}</div>
      <div class="single-icon-display">
        <iconify-icon icon="${current.icon}" width="${displaySize}" height="${displaySize}"></iconify-icon>
      </div>
      <div class="single-icon-name">${current.icon}</div>
      <div class="single-nav">
        <button onclick="navSingle(-1)">&larr; Prev</button>
        <span class="single-icon-name">${singleIndex + 1} / ${allVisibleIcons.length}</span>
        <button onclick="navSingle(1)">Next &rarr;</button>
      </div>
    </div>
  `;
}

function navSingle(dir) {
  singleIndex += dir;
  renderCanvas();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.body.classList.contains('fullscreen')) {
      toggleFullscreen();
    }
    return;
  }
  if (e.key === 'f' || e.key === 'F') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    toggleFullscreen();
  }
  if (e.key === 'd' || e.key === 'D') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    toggleDark();
  }
  if (e.key === 'ArrowLeft') { singleIndex--; renderCanvas(); }
  if (e.key === 'ArrowRight') { singleIndex++; renderCanvas(); }
});

// Init
buildFsSelect();
renderSidebar();
renderCanvas();
syncFsSelect();
</script>
</body>
</html>
