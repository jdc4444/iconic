// === Loading Mode Functions (parallel to Buttons) ===
function renderLoadingSidebar(el) {
  let html = '';
  let filtered = [];
  LOADING_CATALOG.forEach((cat, i) => {
    if (hiddenLoadingCats.has(i)) return;
    const catMatch = searchMatch(cat.category.toLowerCase(), searchFilter);
    const matchingItems = searchFilter
      ? cat.buttons.filter(b => catMatch || searchMatch(b.label.toLowerCase(), searchFilter))
      : cat.buttons;
    if (searchFilter && matchingItems.length === 0) return;
    filtered.push({ idx: i, cat, count: searchFilter ? matchingItems.length : cat.buttons.length });
  });
  if (activeFilter === 'liked') filtered = filtered.filter(f => likedLoadingCats.has(f.idx));
  if (activeFilter === 'dark') filtered = filtered.filter(f => f.cat.dark);
  if (sortMode === 'name') filtered.sort((a, b) => a.cat.category.localeCompare(b.cat.category));
  for (const f of filtered) {
    const active = activeLoadingCats.has(f.idx) ? ' active' : '';
    const liked = likedLoadingCats.has(f.idx) ? ' set-liked' : '';
    html += `<div class="set-item${active}" onclick="loadLoadingCat(${f.idx})" onmouseenter="loadLoadingCat(${f.idx})">
      <div class="dot"></div>
      <div class="set-info"><div class="set-name">${f.cat.category}</div></div>
      <div class="set-count">${f.count}</div>
      <div class="set-rate">
        <button class="${liked ? 'set-liked' : ''}" onclick="event.stopPropagation();rateLoadingCat(${f.idx},'minus')" title="Hide">&minus;</button>
        <button class="${liked}" onclick="event.stopPropagation();rateLoadingCat(${f.idx},'plus')" title="${liked ? 'Unlike' : 'Like'}">&plus;</button>
      </div>
    </div>`;
  }
  el.innerHTML = html;
  document.getElementById('searchInput').placeholder = 'Search loading...';
  renderControls('loading');
}

function loadLoadingCat(idx) {
  if (activeLoadingCats.size === 1 && activeLoadingCats.has(idx)) return; // already active
  showAll = false;
  activeLoadingCats.clear();
  activeLoadingCats.add(idx);
  loadingSingleIndex = 0;
  document.querySelectorAll('.set-item').forEach(el => {
    const onclick = el.getAttribute('onclick') || '';
    el.classList.toggle('active', onclick.includes(`(${idx})`));
  });
  renderCanvas();
  saveState();
}

function getAllVisibleLoading() {
  const result = [];
  if (searchFilter) {
    LOADING_CATALOG.forEach((cat, idx) => {
      if (hiddenLoadingCats.has(idx)) return;
      const catMatch = searchMatch(cat.category.toLowerCase(), searchFilter);
      cat.buttons.forEach((b, bi) => {
        const lid = `${idx}:${bi}`;
        if (hiddenLoadingItems.has(lid)) return;
        if (catMatch || searchMatch(b.label.toLowerCase(), searchFilter))
          result.push({ catIdx: idx, btnIdx: bi, btn: b, category: cat.category, dark: !!cat.dark, id: lid });
      });
    });
  } else if (activeLoadingCats.size === 0) {
    LOADING_CATALOG.forEach((cat, idx) => {
      if (hiddenLoadingCats.has(idx)) return;
      cat.buttons.forEach((b, bi) => {
        const lid = `${idx}:${bi}`;
        if (hiddenLoadingItems.has(lid)) return;
        result.push({ catIdx: idx, btnIdx: bi, btn: b, category: cat.category, dark: !!cat.dark, id: lid });
      });
    });
  } else {
    for (const idx of activeLoadingCats) {
      const cat = LOADING_CATALOG[idx];
      if (!cat) continue;
      cat.buttons.forEach((b, bi) => {
        const lid = `${idx}:${bi}`;
        if (hiddenLoadingItems.has(lid)) return;
        result.push({ catIdx: idx, btnIdx: bi, btn: b, category: cat.category, dark: !!cat.dark, id: lid });
      });
    }
  }
  result.forEach((item, i) => item.globalIdx = i);
  return result;
}

function renderLoadingHtml(item, size) {
  const s = size || 1;
  const inner = item.inner || '';
  const cls = item.cls ? ` ${item.cls}` : '';
  // Parse intrinsic size from style to normalize scale
  const wMatch = item.style.match(/width:\s*(\d+)px/);
  const hMatch = item.style.match(/height:\s*(\d+)px/);
  const intrinsicW = wMatch ? parseInt(wMatch[1]) : 20;
  const intrinsicH = hMatch ? parseInt(hMatch[1]) : 20;
  const maxDim = Math.max(intrinsicW, intrinsicH, 1);
  const targetBase = 28; // normalize everything to 28px
  const normalizeZoom = (targetBase / maxDim) * s;
  return `<div class="loading-item${cls}" style="${item.style};zoom:${normalizeZoom}">${inner}</div>`;
}

function renderLoadingCanvas() {
  const canvas = document.getElementById('canvas');
  const allItems = getAllVisibleLoading();
  if (currentView === 'single' || currentView === 'versions') return renderLoadingSingleView(canvas, allItems);
  canvas.style.overflowY = 'auto';
  canvas.style.overflowX = 'hidden';
  canvas.style.flexDirection = 'column';
  if (!allItems.length) { canvas.innerHTML = '<div class="empty-state">Select a loading category</div>'; return; }
  const groups = {};
  for (const b of allItems) {
    if (!groups[b.catIdx]) groups[b.catIdx] = { category: b.category, dark: b.dark, items: [] };
    groups[b.catIdx].items.push(b);
  }
  let count = 0;
  const loadScale = currentScale / 48;
  canvas.innerHTML = Object.entries(groups).map(([catIdx, g]) => {
    const darkBg = g.dark ? ' dark-bg' : '';
    count += g.items.length;
    return `<div class="btn-cat-section" data-cat-idx="${catIdx}">
      <div class="btn-cat-header">${g.category} <span style="font-weight:400;color:#aaa">${g.items.length}</span></div>
      <div class="btn-cat-grid${darkBg}">${g.items.map(b => {
        const globalIdx = b.globalIdx;
        const lid = b.id || `${b.catIdx}:${b.btnIdx}`;
        const lLiked = likedLoading.has(lid);
        return `<div class="grid-item-wrap" style="padding:12px" onclick="openLoadingSingle(${globalIdx})">
          <div class="grid-item-rate">
            <button onclick="event.stopPropagation();rateLoading('${lid}','minus')" title="Hide">&minus;</button>
            <button class="${lLiked ? 'liked' : ''}" onclick="event.stopPropagation();rateLoading('${lid}','plus')" title="${lLiked ? 'Unlike' : 'Like'}">&plus;</button>
          </div>
          ${renderLoadingHtml(b.btn, loadScale)}</div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
  canvas.insertAdjacentHTML('afterbegin',
    `<div style="font-size:12px;color:var(--muted);margin-bottom:16px">${count} loading styles across ${Object.keys(groups).length} categories</div>`);
  setupScrollSync(canvas, 'loading');
}

function renderLoadingSingleView(canvas, allItems) {
  canvas.style.overflowY = 'auto';
  canvas.style.overflowX = 'hidden';
  canvas.style.flexDirection = 'column';
  if (!allItems.length) { canvas.innerHTML = '<div class="empty-state">No loading animations to show</div>'; return; }
  if (loadingSingleIndex >= allItems.length) loadingSingleIndex = 0;
  if (loadingSingleIndex < 0) loadingSingleIndex = allItems.length - 1;
  const c = allItems[loadingSingleIndex];
  const lid = c.id || `${c.catIdx}:${c.btnIdx}`;
  const isLiked = likedLoading.has(lid);
  const rateHtml = `<button class="rate-btn minus" onclick="rateLoading('${lid}','minus')" title="${isLiked ? 'Remove' : 'Hide'}">&minus;</button>
    <button class="rate-btn plus${isLiked ? ' liked' : ''}" onclick="rateLoading('${lid}','plus')" title="${isLiked ? 'Unlike' : 'Like'}">&plus;</button>`;
  if (currentView === 'versions') {
    const catItems = allItems.filter(b => b.catIdx === c.catIdx);
    const loadScale = currentScale / 48;
    canvas.innerHTML = `<div class="single-view">
      <div class="single-set-name">${c.category}</div>
      <div class="versions-grid" style="max-width:${Math.max(900, (currentScale * 2 + 40) * 4)}px">${catItems.map((b, i) => {
        const gi = b.globalIdx;
        const cur = gi === loadingSingleIndex;
        return `<div class="version-card${cur ? ' current' : ''}" onclick="openLoadingSingle(${gi})" style="${cur ? 'background:var(--hover)' : ''}">
          ${renderLoadingHtml(b.btn, loadScale)}
          <div class="version-label" title="${b.btn.label}">${b.btn.label}</div>
        </div>`;
      }).join('')}</div>
      <div class="single-icon-name">${catItems.length} style${catItems.length !== 1 ? 's' : ''}</div>
      ${singleNavHtml('navLoadingSingle(-1)','navLoadingSingle(1)',rateHtml,loadingSingleIndex,allItems.length)}
    </div>`;
    return;
  }
  const bgStyle = c.dark ? 'background:#1a1a2e;padding:60px;border-radius:16px' : '';
  const scaleFactor = Math.max(currentScale / 48, 1.5);
  canvas.innerHTML = `<div class="single-view">
    <div class="single-set-name">${c.category}</div>
    <div style="${bgStyle};display:flex;align-items:center;justify-content:center;max-height:50vh;overflow:hidden;flex-shrink:0">
      ${renderLoadingHtml(c.btn, scaleFactor)}
    </div>
    <div class="single-icon-name" style="font-size:12px;margin-top:12px">${c.btn.label}</div>
    <div style="font-size:10px;color:var(--muted);max-width:500px;word-break:break-all;text-align:center;margin-top:4px;flex-shrink:0">${c.btn.style}</div>
    <div class="single-nav" style="margin-top:16px;flex-shrink:0">
    ${singleNavHtml('navLoadingSingle(-1)','navLoadingSingle(1)',rateHtml,loadingSingleIndex,allItems.length)}
  </div>`;
  syncSidebarToCategory(c.catIdx, 'loadLoadingCat');
}

function openLoadingSingle(idx) { loadingSingleIndex = idx; currentView = 'single'; setView('single'); }
function navLoadingSingle(dir) { loadingSingleIndex += dir; renderCanvas(); }

function rateLoadingCat(idx, action) {
  if (action === 'plus') { hiddenLoadingCats.delete(idx); if (likedLoadingCats.has(idx)) likedLoadingCats.delete(idx); else likedLoadingCats.add(idx); }
  else { if (likedLoadingCats.has(idx)) likedLoadingCats.delete(idx); else hiddenLoadingCats.add(idx); }
  renderSidebar(); saveState();
}

function rateLoading(lid, action) {
  if (action === 'plus') { hiddenLoadingItems.delete(lid); if (likedLoading.has(lid)) likedLoading.delete(lid); else likedLoading.add(lid); }
  else { if (likedLoading.has(lid)) likedLoading.delete(lid); else { hiddenLoadingItems.add(lid); saveState(); navLoadingSingle(1); return; } }
  renderCanvas(); saveState();
}

function navLoadingCat(dir) {
  const cats = [];
  LOADING_CATALOG.forEach((cat, i) => {
    if (hiddenLoadingCats.has(i)) return;
    if (searchFilter) {
      const catMatch = searchMatch(cat.category.toLowerCase(), searchFilter);
      const hasMatch = cat.buttons.some(b => catMatch || searchMatch(b.label.toLowerCase(), searchFilter));
      if (!hasMatch) return;
    }
    cats.push(i);
  });
  if (!cats.length) return;
  const currentIdx = activeLoadingCats.size === 1 ? [...activeLoadingCats][0] : -1;
  let pos = cats.indexOf(currentIdx);
  pos += dir;
  if (pos < 0) pos = cats.length - 1;
  if (pos >= cats.length) pos = 0;
  loadLoadingCat(cats[pos]);
  const el = document.querySelector('.set-item.active');
  if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

async function renderCanvas() {
  const canvas = document.getElementById('canvas');

  if (appMode === 'loading') { renderLoadingCanvas(); applyAnim(); return; }

  // Search results scroll vertically; normal view scrolls horizontally
  if (searchFilter) {
    canvas.style.overflowY = 'auto';
    canvas.style.overflowX = 'hidden';
    canvas.style.flexDirection = 'column';
  } else {
    canvas.style.overflowY = 'hidden';
    canvas.style.overflowX = 'auto';
    canvas.style.flexDirection = '';
  }

  // When searching, show matching icons from ALL sets (fetched on demand)
  // When not searching, show only the active/selected set(s)
  let displaySets;
  if (searchFilter) {
    // Filter eligible sets by type filter
    const eligible = SETS.filter(s => {
      if (hiddenSets.has(s.id)) return false;
      if (activeFilter === 'color' && !s.palette) return false;
      if (activeFilter === 'animated' && !s.animated) return false;
      if (activeFilter === 'stroke' && !s.stroke) return false;
      if (activeFilter === 'emoji' && s.tier !== 'Emoji') return false;
      if (activeFilter === 'logos' && s.tier !== 'Logos') return false;
      if (activeFilter === 'material' && s.tier !== 'Material') return false;
      if (activeFilter === 'liked' && !likedSets.has(s.id) && !likedIconPrefixes.has(s.prefix)) return false;
      return true;
    });
    // Immediately show sets with cached matches or name/author matches
    const cachedMatches = eligible.filter(s => {
      if (searchMatch(s.name.toLowerCase(), searchFilter) || searchMatch(s.author.toLowerCase(), searchFilter)) return true;
      const c = iconCache[s.prefix];
      if (c) return c.some(name => searchMatch(name.toLowerCase(), searchFilter));
      return s.sample.some(name => searchMatch(name.toLowerCase(), searchFilter));
    });
    displaySets = cachedMatches;
    // Progressively fetch uncached sets and add matches
    const uncachedEligible = eligible.filter(s => !iconCache[s.prefix] && !cachedMatches.includes(s));
    if (uncachedEligible.length > 0) {
      const savedFilter = searchFilter;
      const savedExact = searchExact;
      // Render what we have first, then stream in rest
      if (cachedMatches.length) {
        renderIconGrid(canvas, cachedMatches);
      } else {
        canvas.innerHTML = '<div class="empty-state">Searching all icon sets...</div>';
      }
      const BATCH = 15;
      for (let i = 0; i < uncachedEligible.length; i += BATCH) {
        const batch = uncachedEligible.slice(i, i + BATCH);
        await Promise.all(batch.map(s => fetchIcons(s.prefix)));
        if (searchFilter !== savedFilter || searchExact !== savedExact) return;
        for (const s of batch) {
          const icons = getIcons(s);
          if (icons.length > 0) {
            cachedMatches.push(s);
            appendSetToCanvas(canvas, s);
          }
        }
      }
      // Update sidebar once at the end
      renderSidebar();
      applyAnim();
      return;
    }
  } else if (activeSets.has('__all__')) {
    // "All" mode: show all non-hidden sets, load progressively
    displaySets = SETS.filter(s => !hiddenSets.has(s.id));
    // Apply type filters
    if (activeFilter === 'color') displaySets = displaySets.filter(s => s.palette);
    else if (activeFilter === 'animated') displaySets = displaySets.filter(s => s.animated);
    else if (activeFilter === 'stroke') displaySets = displaySets.filter(s => s.stroke);
    else if (activeFilter === 'liked') displaySets = displaySets.filter(s => likedSets.has(s.id) || likedIconPrefixes.has(s.prefix));
  } else {
    displaySets = SETS.filter(s => activeSets.has(s.id));
  }

  // Apply same sort as sidebar
  if (sortMode === 'name') {
    displaySets = [...displaySets].sort((a, b) => a.name.localeCompare(b.name));
  }

  if (!displaySets.length) {
    canvas.innerHTML = '<div class="empty-state">Select an icon set to begin</div>';
    return;
  }

  // "All" mode uses progressive loading like search does
  const isAllMode = activeSets.has('__all__');

  // Split into cached (render now) and uncached (fetch progressively)
  const cached = displaySets.filter(s => iconCache[s.prefix]);
  const uncached = displaySets.filter(s => !iconCache[s.prefix]);

  // For single set selection, fetch all needed before rendering
  if (!searchFilter && !isAllMode && uncached.length) {
    canvas.innerHTML = '<div class="empty-state">Loading icons...</div>';
    await Promise.all(uncached.map(s => fetchIcons(s.prefix)));
    displaySets = displaySets.filter(s => getIcons(s).length > 0);
  }

  // "All" mode: render cached immediately, stream rest
  if (isAllMode && !searchFilter) {
    canvas.style.overflowY = 'auto';
    canvas.style.overflowX = 'hidden';
    canvas.style.flexDirection = 'column';
    if (currentView === 'single' || currentView === 'versions') {
      if (uncached.length) await Promise.all(uncached.map(s => fetchIcons(s.prefix)));
      displaySets = displaySets.filter(s => getIcons(s).length > 0);
      return renderSingleView(canvas, displaySets);
    }
    const readySets = cached.filter(s => getIcons(s).length > 0);
    renderIconGrid(canvas, readySets);
    if (uncached.length) {
      const currentFilter = activeFilter;
      const BATCH = 15;
      for (let i = 0; i < uncached.length; i += BATCH) {
        const batch = uncached.slice(i, i + BATCH);
        await Promise.all(batch.map(s => fetchIcons(s.prefix)));
        if (activeFilter !== currentFilter || !activeSets.has('__all__')) return;
        for (const s of batch) {
          const icons = getIcons(s);
          if (icons.length > 0) appendSetToCanvas(canvas, s);
        }
      }
    }
    return;
  }

  // For search mode, render cached results immediately, then stream uncached
  if (searchFilter) {
    // Filter cached sets to only those with actual matches
    const readySets = cached.filter(s => getIcons(s).length > 0);
    if (currentView === 'single' || currentView === 'versions') {
      // For single/versions, wait for all to load first
      if (uncached.length) await Promise.all(uncached.map(s => fetchIcons(s.prefix)));
      displaySets = displaySets.filter(s => getIcons(s).length > 0);
      return renderSingleView(canvas, displaySets);
    }
    // Render what we have now
    renderIconGrid(canvas, readySets);
    // Fetch uncached sets progressively and append results
    if (uncached.length) {
      const currentSearch = searchFilter; // capture to detect stale renders
      for (const s of uncached) {
        await fetchIcons(s.prefix);
        if (searchFilter !== currentSearch) return; // search changed, abort
        const icons = getIcons(s);
        if (icons.length > 0) appendSetToCanvas(canvas, s, icons);
      }
    }
    return;
  }

  if (currentView === 'single' || currentView === 'versions') { renderSingleView(canvas, displaySets); applyAnim(); return; }
  renderIconGrid(canvas, displaySets);
  applyAnim();
}

const ALL_MODE_ICON_CAP = 24; // max icons per set in All mode grid

function buildSetHtml(s, gridStyle, cellSize, cap = 0) {
  const allNames = getIcons(s);
  if (!allNames.length) return { html: '', icons: [] };
  const capped = cap > 0 && allNames.length > cap;
  const names = capped ? allNames.slice(0, cap) : allNames;
  const icons = names.map(n => ({ icon: `${s.prefix}:${n}`, set: s.name, prefix: s.prefix }));
  const moreBtn = capped
    ? `<div style="padding:4px 8px;font-size:11px;color:var(--muted);cursor:pointer" onclick="loadSet('${s.id}')">${allNames.length - cap} more →</div>`
    : '';
  const html = `<div class="set-section" data-prefix="${s.prefix}">
    <div class="set-section-header">
      <span class="set-section-title">${s.name}</span>
      <span class="set-section-count">${allNames.length.toLocaleString()} icons · ${s.license}</span>
      <span class="set-section-author">${s.author}</span>
    </div>
    <div class="icon-grid" style="${gridStyle}">${icons.map(ic => {
      const iLiked = likedIcons.has(ic.icon);
      return `<div class="icon-cell grid-item-wrap" style="width:${cellSize}px" data-icon="${ic.icon}">
        <div class="grid-item-rate">
          <button onclick="event.stopPropagation();rateIcon('${ic.icon}','minus')">&minus;</button>
          <button class="${iLiked ? 'liked' : ''}" onclick="event.stopPropagation();rateIcon('${ic.icon}','plus')">&plus;</button>
        </div>
        <iconify-icon icon="${ic.icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
        <div class="tooltip">${ic.icon}</div>
      </div>`;
    }).join('')}${moreBtn}</div>
  </div>`;
  return { html, icons };
}

function renderIconGrid(canvas, sets) {
  const cellSize = Math.max(currentScale + 8, 28);
  const isAllOrSearch = activeSets.has('__all__') || !!searchFilter;
  const gridStyle = isAllOrSearch
    ? 'flex-direction:row;align-content:flex-start;max-height:none'
    : '';
  const cap = (activeSets.has('__all__') && !searchFilter) ? ALL_MODE_ICON_CAP : 0;

  allVisibleIcons = [];

  // For All/search mode with many sets, use lazy rendering
  if (isAllOrSearch && sets.length > 10) {
    canvas.innerHTML = '';
    // Create placeholder divs, render on scroll into view
    const lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const idx = parseInt(el.dataset.lazyIdx);
          const s = sets[idx];
          if (!s) return;
          const { html, icons } = buildSetHtml(s, gridStyle, cellSize, cap);
          if (html) {
            el.innerHTML = html;
            el.querySelector('.icon-grid')?.querySelectorAll('.icon-cell').forEach(cell => cell.classList.add('visible'));
            icons.forEach(ic => allVisibleIcons.push(ic));
            rebindIconClicks(el);
          }
          lazyObserver.unobserve(el);
        }
      });
    }, { rootMargin: '600px' });

    for (let i = 0; i < sets.length; i++) {
      const placeholder = document.createElement('div');
      placeholder.dataset.lazyIdx = i;
      placeholder.style.minHeight = '80px'; // reserve space
      canvas.appendChild(placeholder);
      lazyObserver.observe(placeholder);
    }
    return;
  }

  const parts = [];
  for (const s of sets) {
    const { html, icons } = buildSetHtml(s, gridStyle, cellSize, cap);
    if (html) {
      parts.push(html);
      icons.forEach(ic => allVisibleIcons.push(ic));
    }
  }
  canvas.innerHTML = parts.join('');
  rebindIconClicks();
  animateIcons();
}

function appendSetToCanvas(canvas, s) {
  const cellSize = Math.max(currentScale + 8, 28);
  const gridStyle = 'flex-direction:row;align-content:flex-start;max-height:none';
  const isAllOrSearch = activeSets.has('__all__') || !!searchFilter;
  const cap = (activeSets.has('__all__') && !searchFilter) ? ALL_MODE_ICON_CAP : 0;
  const { html, icons } = buildSetHtml(s, gridStyle, cellSize, cap);
  if (!html) return;
  icons.forEach(ic => allVisibleIcons.push(ic));
  canvas.insertAdjacentHTML('beforeend', html);
  rebindIconClicks();
  animateIcons();
}

function rebindIconClicks(root) {
  // Re-bind click handlers based on current allVisibleIcons order
  (root || document).querySelectorAll('.icon-cell[data-icon]').forEach(cell => {
    const icon = cell.dataset.icon;
    const idx = allVisibleIcons.findIndex(ic => ic.icon === icon);
    if (idx !== -1) cell.onclick = () => openSingle(idx);
  });
}

function getVariants(baseName, icons) {
  return icons.filter(ic => {
    const name = ic.icon.split(':')[1];
    return iconBaseName(name) === baseName;
  });
}

function getUniqueBaseIcons(icons) {
  const seen = new Set();
  const result = [];
  for (const ic of icons) {
    const base = iconBaseName(ic.icon.split(':')[1]);
    if (!seen.has(base)) {
      seen.add(base);
      result.push(ic);
    }
  }
  return result;
}

function renderSingleView(canvas, active) {
  allVisibleIcons = [];
  active.forEach(s => {
    const names = getIcons(s);
    names.forEach(n => {
      const fullIcon = `${s.prefix}:${n}`;
      if (!hiddenIcons.has(fullIcon)) allVisibleIcons.push({ icon: fullIcon, set: s.name, prefix: s.prefix });
    });
  });
  if (!allVisibleIcons.length) return;

  // For single/versions, navigate by unique base icons
  const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
  if (singleIndex >= uniqueIcons.length) singleIndex = 0;
  if (singleIndex < 0) singleIndex = uniqueIcons.length - 1;

  const baseIcon = uniqueIcons[singleIndex];
  const baseName = iconBaseName(baseIcon.icon.split(':')[1]);
  const variants = getVariants(baseName, allVisibleIcons);
  // Use selected variant if it matches current base, otherwise use base icon
  const c = (selectedVariant && iconBaseName(selectedVariant.split(':')[1]) === baseName)
    ? (allVisibleIcons.find(ic => ic.icon === selectedVariant) || baseIcon)
    : baseIcon;
  const sz = Math.max(currentScale, 500);
  const isLiked = likedIcons.has(c.icon);
  const rateHtml = `<button class="rate-btn minus" onclick="rateIcon('${c.icon}','minus')" title="${isLiked ? 'Remove from likes' : 'Hide from view'}">&minus;</button>
    <button class="rate-btn plus${isLiked ? ' liked' : ''}" onclick="rateIcon('${c.icon}','plus')" title="${isLiked ? 'Unlike' : 'Like'}">&plus;</button>`;

  if (currentView === 'versions') {
    // Full versions view — all variants displayed larger
    canvas.innerHTML = `<div class="single-view">
      <div class="single-set-name">${c.set}</div>
      <div class="single-icon-name" style="font-size:13px;font-weight:600;margin-bottom:8px">${baseName}</div>
      <div class="versions-grid" style="max-width:${Math.max(700, (currentScale + 40) * 5)}px">${variants.map((v, i) => {
        const vName = v.icon.split(':')[1];
        const suffix = vName.replace(baseName, '').replace(/^-/, '') || 'default';
        return `<div class="version-card" onclick="selectVariant('${v.icon}')">
          <iconify-icon icon="${v.icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
          <div class="version-label" title="${vName}">${suffix}</div>
        </div>`;
      }).join('')}</div>
      <div class="single-icon-name">${variants.length} variant${variants.length !== 1 ? 's' : ''}</div>
      ${singleNavHtml('navSingle(-1)','navSingle(1)',rateHtml,singleIndex,uniqueIcons.length)}
    </div>`;
    return;
  }

  // Single view with variant line below
  const variantHtml = variants.length > 1 ? `<div class="variant-line">${variants.map(v => {
    const isCurrent = v.icon === c.icon;
    return `<div class="variant-icon${isCurrent ? ' current' : ''}" onclick="selectVariant('${v.icon}')" title="${v.icon.split(':')[1]}">
      <iconify-icon icon="${v.icon}" width="20" height="20"></iconify-icon>
    </div>`;
  }).join('')}</div>` : '';

  canvas.innerHTML = `<div class="single-view">
    <div class="single-set-name">${c.set}</div>
    <div class="single-icon-display">
      <iconify-icon icon="${c.icon}" width="${sz}" height="${sz}"></iconify-icon>
    </div>
    <div class="single-icon-name">${c.icon}</div>
    ${variantHtml}
    ${singleNavHtml('navSingle(-1)','navSingle(1)',rateHtml,singleIndex,uniqueIcons.length)}
  </div>`;
}

// Single shared observer for icon visibility — no per-cell getBoundingClientRect
const iconRevealObserver = new IntersectionObserver((entries) => {
  for (const entry of entries) {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      iconRevealObserver.unobserve(entry.target);
    }
  }
}, { rootMargin: '200px' });

function animateIcons() {
  const cells = document.querySelectorAll('.icon-cell:not(.visible)');
  for (const cell of cells) iconRevealObserver.observe(cell);
}

function navSingle(dir) { singleIndex += dir; selectedVariant = null; renderCanvas(); }

function singleNavHtml(prevFn, nextFn, rateHtml, idx, total) {
  return `<button class="side-arrow left" onclick="${prevFn}">&larr;</button>
    <button class="side-arrow right" onclick="${nextFn}">&rarr;</button>
    <div class="single-nav">
      ${rateHtml}
      <span class="single-icon-name">${idx + 1} / ${total}</span>
    </div>`;
}

function openSingle(idx) {
  // Convert grid index to unique base icon index
  if (allVisibleIcons.length) {
    const targetIcon = allVisibleIcons[idx];
    if (targetIcon) {
      const baseName = iconBaseName(targetIcon.icon.split(':')[1]);
      const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
      const baseIdx = uniqueIcons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
      singleIndex = baseIdx !== -1 ? baseIdx : 0;
    }
  }
  currentView = 'single';
  setView('single');
}

const hiddenIcons = new Set(); // icons removed with -

function rateSet(id, action) {
  if (action === 'plus') {
    hiddenSets.delete(id);
    if (likedSets.has(id)) likedSets.delete(id);
    else likedSets.add(id);
  } else {
    if (likedSets.has(id)) likedSets.delete(id);
    else hiddenSets.add(id);
  }
  renderSidebar();
  saveState();
}

function rateIcon(iconId, action) {
  if (action === 'plus') {
    hiddenIcons.delete(iconId);
    if (likedIcons.has(iconId)) likedIcons.delete(iconId);
    else likedIcons.add(iconId);
  } else {
    if (likedIcons.has(iconId)) likedIcons.delete(iconId);
    else { hiddenIcons.add(iconId); updateLikedPrefixes(); saveState(); navSingle(1); return; }
  }
  updateLikedPrefixes();
  renderCanvas();
  saveState();
}

function selectVariant(fullIcon) {
  // Find which base icon this variant belongs to and update singleIndex
  const baseName = iconBaseName(fullIcon.split(':')[1]);
  const uniqueIcons = getUniqueBaseIcons(allVisibleIcons);
  const baseIdx = uniqueIcons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
  if (baseIdx !== -1) singleIndex = baseIdx;
  // In single view, switch the displayed icon to this variant
  // We need to store which variant is selected
  selectedVariant = fullIcon;
  renderCanvas();
}

// Strip variant suffixes to get a base icon name for cross-set matching
function iconBaseName(name) {
  return name
    .replace(/-(thin|light|bold|duotone|fill|filled|solid|outline|outlined|regular|sharp|twotone|broken|linear|bulk)$/g, '')
    .replace(/-(12|16|20|24|32|48)$/g, '')
    .replace(/-alt\d*$/g, '');
}

function findIconMatch(iconName, icons) {
  const baseName = iconBaseName(iconName);
  if (baseName.length < 2) return -1;
  // Exact match
  let idx = icons.findIndex(ic => ic.icon.split(':')[1] === iconName);
  // Base name match
  if (idx === -1) idx = icons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]) === baseName);
  // Candidate contains our base name (not reverse — too loose)
  if (idx === -1 && baseName.length >= 3) idx = icons.findIndex(ic => iconBaseName(ic.icon.split(':')[1]).includes(baseName));
  return idx;
}

async function navSet(dir) {
  const visible = searchFilter
    ? SETS.filter(s => searchMatch(s.name.toLowerCase(), searchFilter) || searchMatch(s.author.toLowerCase(), searchFilter) || searchMatch(s.tier.toLowerCase(), searchFilter))
    : SETS;
  if (!visible.length) return;
  const currentId = activeSets.size === 1 ? [...activeSets][0] : null;

  // Remember current icon name for cross-set matching in single view
  let matchIconName = null;
  if (currentView === 'single' && currentId && allVisibleIcons.length) {
    const cur = allVisibleIcons[singleIndex];
    if (cur) matchIconName = cur.icon.split(':')[1];
  }

  let startIdx = currentId ? visible.findIndex(s => s.id === currentId) : -1;
  let idx = startIdx;

  // If in single view with a match name, skip sets that don't have it
  if (matchIconName && currentView === 'single') {
    const maxTries = visible.length;
    for (let tries = 0; tries < maxTries; tries++) {
      idx += dir;
      if (idx < 0) idx = visible.length - 1;
      if (idx >= visible.length) idx = 0;
      if (idx === startIdx) break; // wrapped around, no match anywhere
      await loadSet(visible[idx].id);
      const matchIdx = findIconMatch(matchIconName, allVisibleIcons);
      if (matchIdx !== -1) {
        singleIndex = matchIdx;
        renderCanvas();
        break;
      }
    }
  } else {
    idx += dir;
    if (idx < 0) idx = visible.length - 1;
    if (idx >= visible.length) idx = 0;
    await loadSet(visible[idx].id);
  }

  // Scroll active item into view
  const el = document.querySelector('.set-item.active');
  if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// Animation cycle system
let animPaused = true; // starts paused
let animIdx = -1; // -1 = no animation

function animSetByIndex(idx) {
  animIdx = idx;
  currentAnim = idx >= 0 ? ANIM_LIST[idx] : null;
  applyAnim();
  updateAnimUI();
  saveState();
}

function animNext() {
  // Right: if paused, start playing current. If playing, skip to next.
  if (animPaused) {
    animPaused = false;
    if (animIdx < 0) animIdx = 0;
    animSetByIndex(animIdx);
  } else {
    animSetByIndex(nextVisibleAnim(animIdx));
  }
  updateAnimUI();
}

function animPrev() {
  // Left: navigate back. Keep current play state.
  if (animIdx < 0) animIdx = 0;
  animSetByIndex(prevVisibleAnim(animIdx));
}

function animTogglePause() {
  animPaused = !animPaused;
  if (animPaused) {
    // Stop playback — remove animation entirely
    currentAnim = null;
    applyAnim();
  } else {
    // Resume — apply current animation
    if (animIdx < 0) animIdx = 0;
    currentAnim = ANIM_LIST[animIdx];
    applyAnim();
  }
  updateAnimUI();
}

function nextVisibleAnim(from) {
  let idx = from;
  for (let i = 0; i < ANIM_LIST.length; i++) {
    idx = (idx + 1) % ANIM_LIST.length;
    if (!hiddenAnims.has(ANIM_LIST[idx])) return idx;
  }
  return from; // all hidden, stay put
}

function prevVisibleAnim(from) {
  let idx = from;
  for (let i = 0; i < ANIM_LIST.length; i++) {
    idx = idx <= 0 ? ANIM_LIST.length - 1 : idx - 1;
    if (!hiddenAnims.has(ANIM_LIST[idx])) return idx;
  }
  return from;
}

// No auto-cycle timer needed — ‹/› navigate manually

function updateAnimUI() {
  const label = document.getElementById('animLabel');
  const pauseBtn = document.getElementById('animPause');
  const animName = animIdx >= 0 ? ANIM_LIST[animIdx] : null;
  if (label) label.textContent = animName ? animName.replace('anim-','') : '';
  if (pauseBtn) {
    pauseBtn.textContent = '⏸';
    pauseBtn.classList.toggle('active', animPaused);
    pauseBtn.style.opacity = animPaused ? '1' : '0.35';
  }
  // +/- buttons
  const likeBtn = document.getElementById('animLike');
  const hideBtn = document.getElementById('animHide');
  if (likeBtn && hideBtn) {
    const show = !!animName;
    likeBtn.style.display = show ? '' : 'none';
    hideBtn.style.display = show ? '' : 'none';
    if (show) {
      likeBtn.textContent = likedAnims.has(animName) ? '♥' : '+';
      likeBtn.style.color = likedAnims.has(animName) ? '#e53935' : '';
      hideBtn.textContent = hiddenAnims.has(animName) ? '↩' : '−';
    }
  }
}

function applyAnim() {
  const targets = document.querySelectorAll('.icon-cell, .loading-item, .single-icon-display, .version-card');
  for (const el of targets) {
    for (const cls of ANIM_LIST) el.classList.remove(cls);
    if (currentAnim) el.classList.add(currentAnim);
  }
}

function toggleAnimLike() {
  if (!currentAnim) return;
  if (likedAnims.has(currentAnim)) likedAnims.delete(currentAnim);
  else likedAnims.add(currentAnim);
  hiddenAnims.delete(currentAnim);
  updateAnimUI();
  saveState();
}

function toggleAnimHide() {
  if (!currentAnim) return;
  if (hiddenAnims.has(currentAnim)) hiddenAnims.delete(currentAnim);
  else { hiddenAnims.add(currentAnim); likedAnims.delete(currentAnim); animNext(); return; }
  updateAnimUI();
  saveState();
}

// Scroll sync: as user scrolls grid, update sidebar selection to match visible category
let scrollSyncObserver = null;
function setupScrollSync(canvas, mode) {
  if (scrollSyncObserver) scrollSyncObserver.disconnect();
  const sections = canvas.querySelectorAll('.btn-cat-section[data-cat-idx]');
  if (!sections.length) return;
  scrollSyncObserver = new IntersectionObserver(entries => {
    for (const entry of entries) {
      if (entry.isIntersecting) {
        const idx = parseInt(entry.target.dataset.catIdx);
        if (isNaN(idx)) continue;
        // Update sidebar highlight without re-rendering
        document.querySelectorAll('.set-item').forEach(el => {
          const onclick = el.getAttribute('onclick') || '';
          const match = onclick.match(/loadLoadingCat\((\d+)\)/);
          if (match) {
            el.classList.toggle('active', parseInt(match[1]) === idx);
          }
        });
        // Scroll sidebar item into view
        const activeEl = document.querySelector('.set-item.active');
        if (activeEl) activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
        break;
      }
    }
  }, { root: canvas, rootMargin: '-20% 0px -60% 0px' });
  sections.forEach(s => scrollSyncObserver.observe(s));
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (document.body.classList.contains('fullscreen')) toggleFullscreen(); return; }
  const inInput = e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT';
  // Allow ↑↓ arrow keys even when search input is focused
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    const dir = e.key === 'ArrowUp' ? -1 : 1;
    appMode === 'loading' ? navLoadingCat(dir) : navSet(dir);
    return;
  }
  if (inInput) return;
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'd' || e.key === 'D') toggleDark();
  if (e.key === 'ArrowLeft') { e.preventDefault(); appMode === 'loading' ? navLoadingSingle(-1) : navSingle(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); appMode === 'loading' ? navLoadingSingle(1) : navSingle(1); }
  if (e.key === ' ') {
    e.preventDefault();
    if (currentView === 'grid') setView('single');
    else if (currentView === 'single') setView('versions');
    else if (currentView === 'versions') setView('grid');
  }
});

// Resize handle
const resizeHandle = document.getElementById('resizeHandle');
const sidebar = document.querySelector('.sidebar');
let isResizing = false;

resizeHandle.addEventListener('mousedown', e => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const w = Math.min(500, Math.max(180, e.clientX));
  sidebar.style.width = w + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizeHandle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  saveState();
});

// Pinch-to-zoom and scroll remapping on canvas
let singleScrollAccum = 0;
let singleScrollTimer = null;
document.getElementById('canvas').addEventListener('wheel', e => {
  if (e.ctrlKey) {
    e.preventDefault();
    const factor = 1 - e.deltaY * 0.01;
    currentScale = Math.round(Math.min(512, Math.max(12, currentScale * factor)));
    updateScale();
    return;
  }
  // In single/versions view, scroll navigates between icons/loaders
  if (currentView === 'single' || currentView === 'versions') {
    e.preventDefault();
    singleScrollAccum += e.deltaY + e.deltaX;
    if (!singleScrollTimer) {
      singleScrollTimer = setTimeout(() => {
        if (Math.abs(singleScrollAccum) > 30) {
          const d = singleScrollAccum > 0 ? 1 : -1;
          appMode === 'loading' ? navLoadingSingle(d) : navSingle(d);
        }
        singleScrollAccum = 0;
        singleScrollTimer = null;
      }, 80);
    }
    return;
  }
  // When searching or in loading grid, allow native vertical scroll
  if (searchFilter || appMode === 'loading') return;
  // Map vertical scroll to horizontal on canvas
  const canvas = document.getElementById('canvas');
  e.preventDefault();
  canvas.scrollLeft += e.deltaY + e.deltaX;
}, { passive: false });

// Persist state to disk (prefs.json) and localStorage as fallback
const STORAGE_KEY = 'iconic-state';

function buildState() {
  return {
    scale: currentScale,
    view: currentView,
    sortMode,
    activeFilter,
    appMode,
    dark: document.body.classList.contains('dark'),
    liked: [...likedIcons],
    hidden: [...hiddenIcons],
    likedSets: [...likedSets],
    hiddenSets: [...hiddenSets],
    likedLoadingItems: [...likedLoading],
    hiddenLoadingItems: [...hiddenLoadingItems],
    likedLoadingCats: [...likedLoadingCats],
    hiddenLoadingCatsList: [...hiddenLoadingCats],
    activeSet: activeSets.size === 1 ? [...activeSets][0] : null,
    activeLoadingCat: activeLoadingCats.size === 1 ? [...activeLoadingCats][0] : null,
    animIdx,
    likedAnims: [...likedAnims],
    hiddenAnims: [...hiddenAnims],
    sidebarWidth: sidebar.style.width || null,
  };
}

let saveTimer = null;
function saveState() {
  const state = buildState();
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  // Debounce disk writes to avoid hammering on rapid changes
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    fetch('/prefs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    }).catch(() => {}); // silent fail if server not available
  }, 300);
}

function applyState(s) {
  if (s.scale) { currentScale = s.scale; updateScale(); }
  // Always open on grid view
  if (s.sortMode) setSortMode(s.sortMode);
  // Don't restore filter — start with no filter active
  if (s.appMode) setMode(s.appMode);
  if (s.dark) toggleDark();
  if (s.liked) s.liked.forEach(id => likedIcons.add(id));
  updateLikedPrefixes();
  if (s.hidden) s.hidden.forEach(id => hiddenIcons.add(id));
  if (s.likedSets) { likedSets.clear(); s.likedSets.forEach(id => likedSets.add(id)); }
  if (s.hiddenSets) s.hiddenSets.forEach(id => hiddenSets.add(id));
  if (s.likedLoadingItems) s.likedLoadingItems.forEach(id => likedLoading.add(id));
  if (s.hiddenLoadingItems) s.hiddenLoadingItems.forEach(id => hiddenLoadingItems.add(id));
  if (s.likedLoadingCats) s.likedLoadingCats.forEach(id => likedLoadingCats.add(id));
  if (s.hiddenLoadingCatsList) s.hiddenLoadingCatsList.forEach(id => hiddenLoadingCats.add(id));
  if (s.activeSet) { activeSets.clear(); activeSets.add(s.activeSet); }
  if (s.activeLoadingCat != null) { activeLoadingCats.clear(); activeLoadingCats.add(s.activeLoadingCat); }
  if (s.animIdx != null && s.animIdx >= 0) { animIdx = s.animIdx; animPaused = true; currentAnim = null; }
  if (s.likedAnims) s.likedAnims.forEach(a => likedAnims.add(a));
  if (s.hiddenAnims) s.hiddenAnims.forEach(a => hiddenAnims.add(a));
  if (s.sidebarWidth) sidebar.style.width = s.sidebarWidth;
}

async function restoreState() {
  // Try disk first (prefs.json), fall back to localStorage
  try {
    const res = await fetch('/prefs');
    if (res.ok) {
      const s = await res.json();
      if (s && Object.keys(s).length > 0) { applyState(s); return; }
    }
  } catch {}
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) applyState(JSON.parse(raw));
  } catch {}
}

restoreState().then(() => { updateAnimUI(); loadCollections(); });
</script>
