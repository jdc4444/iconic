<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f5f5f5;
    --accent: #000;
    --sidebar-w: 500px;
    --topbar-h: 52px;
  }

  body.dark {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --hover: #1a1a1a;
    --accent: #e8e8e8;
  }

  body.dark iconify-icon { color: var(--fg); }
  body.dark .scale-slider { background: var(--border); }
  body.dark .scale-slider::-webkit-slider-thumb { background: var(--fg); }

  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; height: 100vh; }

  .sidebar {
    width: var(--sidebar-w);
    min-width: 180px;
    max-width: 500px;
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }

  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--fg);
    opacity: 0.12;
  }

  .sidebar-header {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header .mode-tab {
    flex: 1;
    padding: 14px 16px 10px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: -0.01em;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    transition: color 0.15s;
    text-align: center;
  }

  .sidebar-header .mode-tab.active { color: var(--fg); }
  .sidebar-header .mode-tab:hover:not(.active) { color: var(--fg); opacity: 0.6; }

  .sidebar-header p { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .sidebar-sort {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sort-btn {
    flex: 1;
    padding: 5px 8px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.1s;
  }

  .sort-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .sort-btn:hover:not(.active) { background: var(--hover); color: var(--fg); }

  .sidebar-search {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }

  .sidebar-search input:focus { border-color: var(--fg); }
  .sidebar-search input::placeholder { color: var(--muted); }
  .search-filters { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .search-filters:empty { display: none; }
  .search-filters .sort-btn { font-size: 10px; padding: 3px 8px; }

  .set-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .set-list::-webkit-scrollbar { width: 4px; }
  .set-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tier-label {
    padding: 10px 16px 5px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }

  .set-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .set-item:hover { background: var(--hover); }
  .set-item.active { background: var(--fg); color: var(--bg); }

  .set-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .set-item.active .dot { background: var(--bg); }

  .set-info { flex: 1; min-width: 0; }

  .set-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .set-count {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .set-item.active .set-count { color: rgba(255,255,255,0.5); }

  .set-rate {
    display: flex; gap: 2px; flex-shrink: 0; margin-left: 4px;
  }
  .set-rate button {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border);
    border-radius: 50%; cursor: pointer;
    color: var(--muted); font-size: 13px; font-family: inherit;
    line-height: 1; padding: 0;
    transition: all 0.1s;
    opacity: 0;
  }
  .set-item:hover .set-rate button { opacity: 1; }
  .set-rate button:hover { border-color: var(--fg); color: var(--fg); }
  .set-rate button.set-liked { opacity: 1; background: var(--fg); border-color: var(--fg); color: var(--bg); }
  .set-item.active .set-rate button { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.5); }
  .set-item.active .set-rate button:hover { border-color: #fff; color: #fff; }
  .set-item.active .set-rate button.set-liked { background: var(--bg); border-color: var(--bg); color: var(--fg); }


  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: var(--topbar-h);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scale-slider {
    width: 140px;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
  }

  .scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
  }

  .scale-value {
    font-size: 11px;
    font-weight: 500;
    min-width: 36px;
    font-variant-numeric: tabular-nums;
  }

  .scale-presets { display: flex; gap: 3px; }

  .scale-presets button, .tb-btn {
    padding: 3px 7px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .scale-presets button:hover, .scale-presets button.active,
  .tb-btn:hover {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .view-toggle { display: flex; gap: 0; }

  .view-toggle button {
    padding: 4px 10px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .view-toggle button:first-child { border-radius: 3px 0 0 3px; }
  .view-toggle button:last-child { border-radius: 0 3px 3px 0; }
  .view-toggle button + button { border-left: none; }

  .view-toggle button.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .tb-btn { padding: 4px 10px; }

  .canvas { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 20px; }
  .canvas::-webkit-scrollbar { height: 6px; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .set-section { margin-bottom: 8px; }

  .set-section-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .set-section-title { font-size: 12px; font-weight: 600; }
  .set-section-count { font-size: 10px; color: var(--muted); }
  .set-section-author { font-size: 10px; color: var(--muted); margin-left: auto; }

  .icon-grid {
    display: flex;
    flex-wrap: wrap;
    flex-direction: column;
    align-content: flex-start;
    gap: 1px;
    max-height: calc(100vh - var(--topbar-h) - 40px);
    padding-bottom: 4px;
  }

  @keyframes icon-enter {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .icon-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    border-radius: 3px;
    transition: background 0.15s;
    cursor: pointer;
    position: relative;
    opacity: 0;
  }

  .icon-cell.visible {
    animation: icon-enter 0.7s ease forwards;
  }

  .icon-cell:hover { background: var(--hover); }
  .icon-cell iconify-icon { display: block; pointer-events: none; }
  .icon-cell .tooltip { pointer-events: none; }

  .icon-cell .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--fg);
    color: var(--bg);
    padding: 3px 7px;
    border-radius: 3px;
    font-size: 9px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }

  .icon-cell:hover .tooltip { display: block; }

  .single-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    gap: 24px;
    text-align: center;
    position: relative;
  }

  .single-icon-display iconify-icon { display: block; }

  .single-nav { display: flex; align-items: center; gap: 16px; }

  .single-nav button {
    padding: 6px 16px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .single-nav button:hover { background: var(--fg); color: var(--bg); }

  .side-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--fg);
    font-size: 18px;
    font-family: inherit;
    z-index: 50;
    transition: all 0.1s;
    opacity: 0.6;
  }
  .side-arrow:hover { opacity: 1; background: var(--fg); color: var(--bg); }
  .side-arrow.left { left: calc(var(--sidebar-w) + (100vw - var(--sidebar-w)) * 0.15); border-radius: 4px; }
  .side-arrow.right { right: calc((100vw - var(--sidebar-w)) * 0.15); border-radius: 4px; }

  /* Grid item hover +/- */
  .grid-item-wrap { position: relative; cursor: pointer; }
  .grid-item-rate {
    position: absolute; top: 2px; right: 2px;
    display: none; gap: 2px; z-index: 10;
  }
  .grid-item-wrap:hover .grid-item-rate { display: flex; }
  .grid-item-rate:has(.liked) { display: flex; }
  .grid-item-rate button {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 50%; cursor: pointer;
    color: var(--muted); font-size: 11px; font-family: inherit;
    line-height: 1; padding: 0; transition: all 0.1s;
  }
  .grid-item-rate button:hover { border-color: var(--fg); color: var(--fg); }
  .grid-item-rate button.liked { background: var(--fg); border-color: var(--fg); color: var(--bg); }

  .variant-line {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 500px;
  }

  .variant-line .variant-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    opacity: 0.5;
  }

  .variant-line .variant-icon:hover { background: var(--hover); opacity: 1; }
  .variant-line .variant-icon.current { opacity: 1; background: var(--hover); }

  .versions-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 700px;
  }

  .version-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
  }

  .version-card:hover { background: var(--hover); }
  .version-card .version-label { font-size: 9px; color: var(--muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .single-icon-name { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .single-set-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  .rate-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border);
    border-radius: 50%; cursor: pointer;
    color: var(--muted);
    font-size: 18px; line-height: 1;
    font-family: inherit; font-weight: 400;
    transition: all 0.15s;
  }
  .rate-btn:hover { border-color: var(--fg); color: var(--fg); }
  .rate-btn.plus { color: var(--fg); }
  .rate-btn.plus:hover { background: var(--fg); color: var(--bg); }
  .rate-btn.minus:hover { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .rate-btn.liked { background: var(--fg); border-color: var(--fg); color: var(--bg); }

  /* Fullscreen */
  body.fullscreen .sidebar { display: none; }
  body.fullscreen .topbar { display: none; }
  body.fullscreen .canvas { padding: 0; }
  body.fullscreen .icon-grid { gap: 0; }
  body.fullscreen .icon-cell { border-radius: 0; }
  body.fullscreen .set-section { margin-bottom: 0; }
  body.fullscreen .set-section-header { display: none; }

  .fs-toolbar {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    gap: 10px;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  body.fullscreen .fs-toolbar { display: flex; }

  .fs-toolbar .scale-slider { width: 100px; }

  .fs-toolbar select {
    font-family: inherit;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    outline: none;
    max-width: 160px;
  }

  .fs-close {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    transition: all 0.1s;
  }

  .fs-close:hover { background: var(--fg); color: var(--bg); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
  }

  /* filter-btn class removed, using sort-btn for unified controls */

  .keyboard-hint {
    padding: 6px 12px;
    font-size: 9px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  kbd {
    display: inline-block;
    padding: 1px 4px;
    font-family: inherit;
    font-size: 9px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--hover);
  }

  /* Shared keyframes (used by loading animations) */
  @keyframes btn-spin { to { transform: rotate(360deg); } }
  @keyframes btn-pulse { 0%,100% { box-shadow: 0 0 0 0 var(--pulse-color, rgba(25,118,210,0.5)); } 50% { box-shadow: 0 0 0 10px transparent; } }
  @keyframes btn-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes btn-breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  @keyframes btn-rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
  @keyframes btn-glow { from { box-shadow: 0 0 5px var(--glow-color); } to { box-shadow: 0 0 20px var(--glow-color), 0 0 40px color-mix(in srgb, var(--glow-color) 40%, transparent); } }
  @keyframes btn-skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Loading animation keyframes */
  @keyframes ld-bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
  @keyframes ld-stretch { 0%,40%,100% { transform:scaleY(0.4); } 20% { transform:scaleY(1); } }
  @keyframes ld-flip { 0% { transform:perspective(120px) rotateX(0) rotateY(0); } 50% { transform:perspective(120px) rotateX(-180deg) rotateY(0); } 100% { transform:perspective(120px) rotateX(-180deg) rotateY(-180deg); } }
  @keyframes ld-fold { 0%,10% { transform:perspective(140px) rotateX(-180deg);opacity:0; } 25%,75% { transform:perspective(140px) rotateX(0);opacity:1; } 90%,100% { transform:perspective(140px) rotateY(180deg);opacity:0; } }
  @keyframes ld-scale-out { 0% { transform:scale(0);opacity:1; } 100% { transform:scale(1);opacity:0; } }
  @keyframes ld-dot-flash { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  @keyframes ld-dot-elastic { 0%,100% { transform:scale(1); } 25% { transform:scale(1,1.5); } 50% { transform:scale(1.5,0.75); } }
  @keyframes ld-slide { 0% { transform:translateX(-100%); } 100% { transform:translateX(400%); } }
  @keyframes ld-progress { 0% { width:0; } 50% { width:70%; } 100% { width:100%; } }
  @keyframes ld-indeterminate { 0% { left:-35%;right:100%; } 60% { left:100%;right:-90%; } 100% { left:100%;right:-90%; } }
  @keyframes ld-orbit { 0% { transform:rotate(0) translateX(10px) rotate(0); } 100% { transform:rotate(360deg) translateX(10px) rotate(-360deg); } }
  @keyframes ld-morph { 0%,100% { border-radius:50%; } 50% { border-radius:10%; } }
  @keyframes ld-bar-scale { 0%,100% { transform:scaleY(1); } 50% { transform:scaleY(2.5); } }
  @keyframes ld-cube-rotate { 0% { transform:rotate(0); } 25% { transform:rotate(90deg); } 50% { transform:rotate(180deg); } 75% { transform:rotate(270deg); } 100% { transform:rotate(360deg); } }
  @keyframes ld-ripple { 0% { transform:scale(0.8);opacity:1; } 100% { transform:scale(2.4);opacity:0; } }
  @keyframes ld-blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
  @keyframes ld-gradient-shift { 0% { background-position:0% 50%; } 50% { background-position:100% 50%; } 100% { background-position:0% 50%; } }
  @keyframes ld-heartbeat { 0%,100% { transform:scale(1); } 14% { transform:scale(1.3); } 28% { transform:scale(1); } 42% { transform:scale(1.3); } 70% { transform:scale(1); } }
  @keyframes ld-wobble { 0%,100% { transform:translateX(0) rotate(0);border-radius:50%; } 25% { transform:translateX(-5px) rotate(-5deg);border-radius:40%; } 75% { transform:translateX(5px) rotate(5deg);border-radius:40%; } }
  @keyframes ld-pendulum { 0%,100% { transform:rotate(-45deg); } 50% { transform:rotate(45deg); } }
  @keyframes ld-scanner { 0%,100% { transform:translateX(-100%); } 50% { transform:translateX(100%); } }
  @keyframes ld-neon-flicker { 0%,19%,21%,23%,25%,54%,56%,100% { opacity:1;text-shadow:0 0 5px currentColor,0 0 10px currentColor; } 20%,24%,55% { opacity:0.5;text-shadow:none; } }
  @keyframes ld-pixel-walk { 0% { transform:translateX(0); } 25% { transform:translateX(4px); } 50% { transform:translateX(8px); } 75% { transform:translateX(4px); } 100% { transform:translateX(0); } }
  @keyframes ld-terminal-cursor { 0%,100% { border-right-color:currentColor; } 50% { border-right-color:transparent; } }
  @keyframes ld-typing { 0%,100% { opacity:0; } 50% { opacity:1; } }
  @keyframes ld-hourglass { 0% { transform:rotate(0); } 50% { transform:rotate(180deg); } 100% { transform:rotate(180deg); } }
  @keyframes ld-pacman-jaw { 0%,100% { clip-path:polygon(50% 50%,0 0,100% 0,100% 100%,0 100%); } 50% { clip-path:polygon(50% 50%,30% 0,100% 0,100% 100%,30% 100%); } }
  @keyframes ld-pacman-dot { 0% { transform:translateX(0); } 100% { transform:translateX(-20px);opacity:0; } }
  @keyframes ld-spiral { 0% { transform:rotate(0) scale(1); } 50% { transform:rotate(180deg) scale(0.5); } 100% { transform:rotate(360deg) scale(1); } }
  @keyframes ld-breathe { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
  @keyframes ld-pulse { 0%,100% { transform:scale(1);opacity:1; } 50% { transform:scale(0.85);opacity:0.5; } }

  .loading-item { display:inline-flex;align-items:center;justify-content:center;color:var(--fg); }

  /* Standard animation library — applicable to any element */
  @keyframes anim-pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
  @keyframes anim-spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
  @keyframes anim-bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }
  @keyframes anim-shimmer { 0%,100% { filter:drop-shadow(0 0 0 transparent); } 50% { filter:drop-shadow(0 0 8px currentColor) drop-shadow(0 0 2px currentColor); } }
  @keyframes anim-glow { 0%,100% { filter:drop-shadow(0 0 2px currentColor); } 50% { filter:drop-shadow(0 0 8px currentColor); } }
  @keyframes anim-fade { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes anim-shake { 0%,100% { transform:translateX(0); } 20% { transform:translateX(-2px); } 40% { transform:translateX(2px); } 60% { transform:translateX(-1px); } 80% { transform:translateX(1px); } }
  @keyframes anim-float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-3px); } }
  @keyframes anim-flip { 0% { transform:rotateY(0); } 100% { transform:rotateY(360deg); } }
  @keyframes anim-wiggle { 0%,100% { transform:rotate(0); } 25% { transform:rotate(-3deg); } 75% { transform:rotate(3deg); } }
  @keyframes anim-pop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }
  @keyframes anim-slide { 0% { transform:translateX(-6px);opacity:0; } 100% { transform:translateX(0);opacity:1; } }

  /* Animations target iconify-icon/button children, or standalone elements */
  [class*="anim-"] > iconify-icon,
  [class*="anim-"]:is(.single-icon-display,.loading-item,.version-card) { animation: var(--anim); }
  .anim-pulse { --anim:anim-pulse 2s ease-in-out infinite; }
  .anim-spin { --anim:anim-spin 2s linear infinite; }
  .anim-bounce { --anim:anim-bounce 1s ease-in-out infinite; }
  .anim-shimmer { --anim:anim-shimmer 2s ease-in-out infinite; }
  .anim-glow { --anim:anim-glow 2s ease-in-out infinite; }
  .anim-fade { --anim:anim-fade 2s ease-in-out infinite; }
  .anim-shake { --anim:anim-shake 0.5s ease-in-out infinite; }
  .anim-float { --anim:anim-float 3s ease-in-out infinite; }
  .anim-flip { --anim:anim-flip 2s ease-in-out infinite; }
  .anim-wiggle { --anim:anim-wiggle 1s ease-in-out infinite; }
  .anim-pop { --anim:anim-pop 1s ease-in-out infinite; }
  .anim-slide { --anim:anim-slide 0.6s ease-out infinite alternate; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="mode-tab active" id="modeIcons" onclick="setMode('icons')">Icons</button>
      <button class="mode-tab" id="modeLoading" onclick="setMode('loading')">Loading</button>
    </div>
    <div class="sidebar-sort" id="sidebarControls"></div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search sets..." oninput="filterSets(this.value)" onkeydown="if(event.key==='Enter'){filterSetsExact();event.preventDefault()}">
      <div id="searchFilters" class="search-filters"></div>
    </div>
    <div class="keyboard-hint">
      <kbd>↑</kbd><kbd>↓</kbd> Sets <kbd>←</kbd><kbd>→</kbd> Icons <kbd>Space</kbd> Versions <kbd>F</kbd> Full <kbd>D</kbd> Dark <kbd>Esc</kbd> Exit
    </div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="main">
    <div class="topbar">
      <label>Scale</label>
      <input type="range" class="scale-slider" id="scaleSlider" min="12" max="512" value="100">
      <span class="scale-value" id="scaleValue">100px</span>
      <div class="scale-presets">
        <button onclick="setScale(24)">24</button>
        <button onclick="setScale(48)">48</button>
        <button onclick="setScale(96)">96</button>
        <button onclick="setScale(256)">256</button>
      </div>
      <div class="view-toggle" id="animToggle" style="margin-left:8px;gap:0">
        <button onclick="animPrev()" title="Previous animation" style="border-radius:3px 0 0 3px">‹</button>
        <button class="active" id="animPause" onclick="animTogglePause()" title="Pause/Stop" style="border-radius:0;border-left:none;border-right:none">⏸</button>
        <button id="animRight" onclick="animNext()" title="Play / Next animation" style="border-radius:0 3px 3px 0">›</button>
        <span id="animLabel" style="font-size:9px;color:var(--muted);min-width:40px;text-align:center;padding:0 4px;align-self:center"></span>
        <button id="animLike" onclick="toggleAnimLike()" title="Like animation" style="font-size:9px;padding:1px 4px;margin-left:2px;border-radius:3px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:none">+</button>
        <button id="animHide" onclick="toggleAnimHide()" title="Hide animation" style="font-size:9px;padding:1px 4px;border-radius:3px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:none">−</button>
      </div>
      <div style="margin-left:auto"></div>
      <div class="view-toggle">
        <button id="tbLiked" onclick="toggleLikedFilter()">Liked</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')" id="btnGrid">Grid</button>
        <button onclick="setView('single')" id="btnSingle">Single</button>
        <button onclick="setView('versions')" id="btnVersions">Versions</button>
      </div>
      <button class="tb-btn" onclick="toggleDark()" id="btnDark">Dark</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="empty-state">Select an icon set to begin</div>
    </div>
  </div>
</div>

<div class="fs-toolbar" id="fsToolbar">
  <select id="fsSetSelect" onchange="fsSelectSet(this.value)"></select>
  <label style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Scale</label>
  <input type="range" class="scale-slider" id="fsScaleSlider" min="12" max="512" value="100">
  <span class="scale-value" id="fsScaleValue">100px</span>
  <div class="scale-presets">
    <button onclick="setScale(24)">24</button>
    <button onclick="setScale(48)">48</button>
    <button onclick="setScale(96)">96</button>
    <button onclick="setScale(256)">256</button>
    <button onclick="setScale(512)">512</button>
  </div>
  <button class="tb-btn" onclick="toggleDark()" id="btnDarkFs">Dark</button>
  <button class="fs-close" onclick="toggleFullscreen()" title="Exit (Esc)">&#215;</button>
</div>

<script>
let SETS = [];
let TIER_ORDER = [];
let activeSets = new Set();
let currentScale = 100;
let currentView = 'grid';
let singleIndex = 0;
let allVisibleIcons = [];
let searchFilter = '';
let searchExact = false; // true after Enter — word-boundary match
let sortMode = 'category'; // 'category' or 'name'
let selectedVariant = null; // specific variant in single view
let activeFilter = null; // null, 'color', 'animated', 'liked', etc.
let showAll = true; // All toggle — shows all sets, deselects on nav click
let appMode = 'icons'; // 'icons' or 'loading'
const likedIcons = new Set(); // stores liked icon identifiers (prefix:name)
const likedIconPrefixes = new Set(); // prefixes that have liked individual icons
const likedSets = new Set(['lucide', 'lucide-lab']); // liked icon set prefixes
function updateLikedPrefixes() {
  likedIconPrefixes.clear();
  for (const ic of likedIcons) likedIconPrefixes.add(ic.split(':')[0]);
}
const hiddenSets = new Set(); // hidden icon set prefixes
let loadingSingleIndex = 0;
const activeLoadingCats = new Set();
const likedLoading = new Set();
const likedLoadingCats = new Set();
const hiddenLoadingCats = new Set();
const hiddenLoadingItems = new Set();
const iconCache = {}; // prefix -> [icon names]
let renderBatchToken = 0; // cancels stale chunked renders
let currentAnim = null; // current animation class name or null
const ANIM_LIST = ['anim-pulse','anim-spin','anim-bounce','anim-shimmer','anim-glow','anim-fade','anim-shake','anim-float','anim-flip','anim-wiggle','anim-pop','anim-slide'];
// no auto-cycle timer
let likedAnims = new Set();
let hiddenAnims = new Set();

async function loadCollections() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '<div class="empty-state">Loading collections...</div>';
  try {
    const res = await fetch('https://api.iconify.design/collections');
    const data = await res.json();
    // Build SETS from API data
    const sets = [];
    const categories = new Set();
    for (const [prefix, info] of Object.entries(data)) {
      const tier = info.category || 'Uncategorized';
      categories.add(tier);
      sets.push({
        id: prefix,
        prefix: prefix,
        name: info.name || prefix,
        tier: tier,
        count: info.total || 0,
        author: info.author?.name || '',
        license: info.license?.spdx || info.license?.title || '',
        sample: info.samples || [],
        palette: !!info.palette,
        animated: !!(info.tags && info.tags.includes('Contains Animations')),
        stroke: !!(info.tags && info.tags.includes('Uses Stroke')),
        tags: info.tags || [],
      });
    }
    // Sort by category then name
    TIER_ORDER = [...categories].sort();
    sets.sort((a, b) => {
      const ti = TIER_ORDER.indexOf(a.tier) - TIER_ORDER.indexOf(b.tier);
      if (ti !== 0) return ti;
      return a.name.localeCompare(b.name);
    });
    SETS = sets;
    document.querySelector('title').textContent = `Iconic — ${SETS.length} Sets`;
    // Default to All
    if (SETS.length) activeSets.add('__all__');
    buildFsSelect();
    renderSidebar();
    await renderCanvas();
    syncFsSelect();
  } catch (e) {
    canvas.innerHTML = '<div class="empty-state">Failed to load collections. Check network.</div>';
  }
}

function setMode(mode) {
  appMode = mode;
  document.getElementById('modeIcons').classList.toggle('active', mode === 'icons');
  document.getElementById('modeLoading').classList.toggle('active', mode === 'loading');
  // Loading defaults to showing all (empty set = all)
  renderSidebar();
  renderCanvas();
  saveState();
}

function setSortMode(mode) {
  sortMode = mode;
  renderSidebar();
  saveState();
}

function renderSidebar() {
  const el = document.getElementById('setList');

  if (appMode === 'loading') return renderLoadingSidebar(el);

  // Restore icon-mode UI
  document.getElementById('searchInput').placeholder = 'Search sets...';
  renderControls('icons');

  let filtered = searchFilter
    ? SETS.filter(s => {
        if (searchMatch(s.name.toLowerCase(), searchFilter) || searchMatch(s.author.toLowerCase(), searchFilter) || searchMatch(s.tier.toLowerCase(), searchFilter)) return true;
        // Also match if any cached icon name contains the search term
        const cached = iconCache[s.prefix];
        if (cached) return cached.some(name => searchMatch(name.toLowerCase(), searchFilter));
        // Check sample icons as fallback
        return s.sample.some(name => searchMatch(name.toLowerCase(), searchFilter));
      })
    : [...SETS];

  // Apply type filter
  if (activeFilter === 'color') filtered = filtered.filter(s => s.palette);
  else if (activeFilter === 'animated') filtered = filtered.filter(s => s.animated);
  else if (activeFilter === 'stroke') filtered = filtered.filter(s => s.stroke);
  else if (activeFilter === 'emoji') filtered = filtered.filter(s => s.tier === 'Emoji');
  else if (activeFilter === 'logos') filtered = filtered.filter(s => s.tier === 'Logos');
  else if (activeFilter === 'flags') filtered = filtered.filter(s => s.tier === 'Flags / Maps');
  else if (activeFilter === 'material') filtered = filtered.filter(s => s.tier === 'Material');
  else if (activeFilter === 'liked') filtered = filtered.filter(s => likedSets.has(s.id) || likedIconPrefixes.has(s.prefix));
  // Hide sets removed with -
  filtered = filtered.filter(s => !hiddenSets.has(s.id));

  if (sortMode === 'name') {
    filtered = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
  }

  let html = '';
  let lastTier = '';
  for (const s of filtered) {
    if (sortMode === 'category' && s.tier !== lastTier) {
      html += `<div class="tier-label">${s.tier}</div>`;
      lastTier = s.tier;
    }
    const active = (activeSets.has(s.id) && !activeSets.has('__all__')) ? ' active' : '';
    const liked = likedSets.has(s.id) ? ' set-liked' : '';
    html += `<div class="set-item${active}" onclick="loadSet('${s.id}')" onmouseenter="loadSet('${s.id}')">
      <div class="dot"></div>
      <div class="set-info"><div class="set-name">${s.name}</div></div>
      <div class="set-count">${s.count.toLocaleString()}</div>
      <div class="set-rate">
        <button class="${liked ? 'set-liked' : ''}" onclick="event.stopPropagation();rateSet('${s.id}','minus')" title="Hide set">&minus;</button>
        <button class="${liked}" onclick="event.stopPropagation();rateSet('${s.id}','plus')" title="${liked ? 'Unlike' : 'Like'}">&plus;</button>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}


let _searchDebounce = null;
function filterSets(q) {
  searchFilter = q.toLowerCase();
  searchExact = false;
  // Sidebar updates instantly for snappy feel
  renderSidebar();
  // Canvas re-render is debounced since it's heavier
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(() => renderCanvas(), 150);
}

function filterSetsExact() {
  if (!searchFilter) return;
  searchExact = true;
  renderSidebar();
  renderCanvas();
}

// Word-boundary match: "car" matches "car", "car-door", "toy-car" but NOT "card", "cardinal"
function searchMatch(text, query) {
  if (!searchExact) return text.includes(query);
  const re = new RegExp('(^|[\\s\\-_/])' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '($|[\\s\\-_/])', 'i');
  return re.test(text);
}

function toggleShowAll() {
  showAll = !showAll;
  if (showAll) {
    // All mode: deselect specific nav selections, but keep filters
    if (appMode === 'loading') activeLoadingCats.clear();
    if (appMode === 'icons') { activeSets.clear(); activeSets.add('__all__'); }
  }
  renderSidebar();
  renderCanvas();
  renderControls(appMode);
  saveState();
}

function toggleLikedFilter() {
  if (activeFilter === 'liked') {
    activeFilter = null;
  } else {
    activeFilter = 'liked';
    // Don't touch showAll — liked is a filter, not a nav selection
  }
  renderSidebar();
  renderCanvas();
  renderControls(appMode);
  saveState();
}

function toggleFilter(type) {
  activeFilter = activeFilter === type ? null : type;
  // Don't touch showAll — filters are orthogonal to All toggle
  renderSidebar();
  renderCanvas();
  renderControls(appMode);
  saveState();
}

async function loadSet(id) {
  if (activeSets.size === 1 && activeSets.has(id)) return; // already active
  showAll = false;
  activeSets.clear();
  activeSets.add(id);
  // Update active class without full re-render to prevent layout bounce
  document.querySelectorAll('.set-item').forEach(el => {
    const onclick = el.getAttribute('onclick') || '';
    el.classList.toggle('active', onclick.includes(`'${id}'`));
  });
  renderControls(appMode);
  await renderCanvas();
  syncFsSelect();
  saveState();
}

function selectAll() {
  SETS.forEach(s => activeSets.add(s.id));
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

function selectNone() {
  activeSets.clear();
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

const slider = document.getElementById('scaleSlider');
const fsSlider = document.getElementById('fsScaleSlider');
slider.addEventListener('input', () => { currentScale = parseInt(slider.value); updateScale(); });
fsSlider.addEventListener('input', () => { currentScale = parseInt(fsSlider.value); updateScale(); });

function setScale(v) { currentScale = v; updateScale(); saveState(); }

let scaleRenderTimer = null;
function updateScale() {
  slider.value = currentScale;
  fsSlider.value = currentScale;
  document.getElementById('scaleValue').textContent = currentScale + 'px';
  document.getElementById('fsScaleValue').textContent = currentScale + 'px';
  document.querySelectorAll('.scale-presets button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === currentScale);
  });
  // Debounce render for smooth pinch
  clearTimeout(scaleRenderTimer);
  scaleRenderTimer = setTimeout(() => { renderCanvas(); saveState(); }, 50);
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnSingle').classList.toggle('active', v === 'single');
  document.getElementById('btnVersions').classList.toggle('active', v === 'versions');
  if (v === 'grid') singleIndex = 0;
  renderCanvas();
  saveState();
}

function toggleFullscreen() { document.body.classList.toggle('fullscreen'); }

function toggleDark() {
  document.body.classList.toggle('dark');
  const d = document.body.classList.contains('dark');
  document.getElementById('btnDark').textContent = d ? 'Light' : 'Dark';
  document.getElementById('btnDarkFs').textContent = d ? 'Light' : 'Dark';
  saveState();
}

function buildFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  let html = '<option value="__all__">All Sets</option>';
  let lastTier = '';
  for (const s of SETS) {
    if (s.tier !== lastTier) {
      if (lastTier) html += '</optgroup>';
      html += `<optgroup label="${s.tier}">`;
      lastTier = s.tier;
    }
    html += `<option value="${s.id}">${s.name} (${s.count.toLocaleString()})</option>`;
  }
  html += '</optgroup>';
  sel.innerHTML = html;
}

function syncFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  if (activeSets.size === SETS.length) sel.value = '__all__';
  else if (activeSets.size === 1) sel.value = [...activeSets][0];
}

function fsSelectSet(val) {
  if (val === '__all__') selectAll();
  else loadSet(val);
}

async function fetchIcons(prefix) {
  if (iconCache[prefix]) return iconCache[prefix];
  try {
    const res = await fetch(`https://api.iconify.design/collection?prefix=${prefix}`);
    const data = await res.json();
    let icons = [];
    if (data.uncategorized) icons = data.uncategorized;
    else if (data.categories) {
      for (const cat of Object.values(data.categories)) icons.push(...cat);
    }
    if (!icons.length && data.icons) icons = data.icons;
    iconCache[prefix] = icons;
    return icons;
  } catch {
    const s = SETS.find(s => s.prefix === prefix);
    return s ? s.sample : [];
  }
}

function getIcons(s) {
  const icons = iconCache[s.prefix] || s.sample;
  let result = icons;
  if (searchFilter) {
    result = result.filter(name => searchMatch(name.toLowerCase(), searchFilter));
  }
  // When liked filter active and set isn't a fully-liked set, only show liked icons
  if (activeFilter === 'liked' && !likedSets.has(s.id)) {
    result = result.filter(name => likedIcons.has(s.prefix + ':' + name));
  }
  return result;
}


// === LOADING ANIMATION CATALOG ===
