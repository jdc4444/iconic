<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Sampler — 100 Sets</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.2/dist/iconify-icon.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fff;
    --fg: #000;
    --muted: #666;
    --border: #e0e0e0;
    --hover: #f5f5f5;
    --accent: #000;
    --sidebar-w: 260px;
    --topbar-h: 52px;
  }

  body.dark {
    --bg: #111;
    --fg: #e8e8e8;
    --muted: #888;
    --border: #2a2a2a;
    --hover: #1a1a1a;
    --accent: #e8e8e8;
  }

  body.dark iconify-icon { color: var(--fg); }
  body.dark .scale-slider { background: var(--border); }
  body.dark .scale-slider::-webkit-slider-thumb { background: var(--fg); }

  body {
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  .app { display: flex; height: 100vh; }

  .sidebar {
    width: var(--sidebar-w);
    min-width: 180px;
    max-width: 500px;
    border-right: none;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: transparent;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }

  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--fg);
    opacity: 0.12;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
  .sidebar-header p { font-size: 11px; color: var(--muted); line-height: 1.4; }

  .sidebar-search {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    padding: 6px 10px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }

  .sidebar-search input:focus { border-color: var(--fg); }
  .sidebar-search input::placeholder { color: var(--muted); }

  .set-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  .set-list::-webkit-scrollbar { width: 4px; }
  .set-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tier-label {
    padding: 8px 16px 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 1;
  }

  .set-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 16px;
    cursor: pointer;
    transition: background 0.1s;
    user-select: none;
  }

  .set-item:hover { background: var(--hover); }
  .set-item.active { background: var(--fg); color: var(--bg); }

  .set-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }

  .set-item.active .dot { background: var(--bg); }

  .set-info { flex: 1; min-width: 0; }

  .set-name {
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .set-count {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .set-item.active .set-count { color: rgba(255,255,255,0.5); }

  .sidebar-actions {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  .sidebar-actions button {
    flex: 1;
    padding: 5px 0;
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .sidebar-actions button:hover { opacity: 0.8; }
  .btn-primary { background: var(--fg); color: var(--bg); }
  .btn-secondary { background: transparent; color: var(--fg); border: 1px solid var(--border) !important; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: var(--topbar-h);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .scale-slider {
    width: 140px;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    outline: none;
    border-radius: 1px;
  }

  .scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
  }

  .scale-value {
    font-size: 11px;
    font-weight: 500;
    min-width: 36px;
    font-variant-numeric: tabular-nums;
  }

  .scale-presets { display: flex; gap: 3px; }

  .scale-presets button, .tb-btn {
    padding: 3px 7px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .scale-presets button:hover, .scale-presets button.active,
  .tb-btn:hover {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .view-toggle { margin-left: auto; display: flex; gap: 0; }

  .view-toggle button {
    padding: 4px 10px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .view-toggle button:first-child { border-radius: 3px 0 0 3px; }
  .view-toggle button:last-child { border-radius: 0 3px 3px 0; }
  .view-toggle button + button { border-left: none; }

  .view-toggle button.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .tb-btn { padding: 4px 10px; }

  .canvas { flex: 1; overflow-y: auto; padding: 20px; }
  .canvas::-webkit-scrollbar { width: 6px; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .set-section { margin-bottom: 32px; }

  .set-section-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .set-section-title { font-size: 12px; font-weight: 600; }
  .set-section-count { font-size: 10px; color: var(--muted); }
  .set-section-author { font-size: 10px; color: var(--muted); margin-left: auto; }

  .icon-grid { display: flex; flex-wrap: wrap; gap: 1px; }

  .icon-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    border-radius: 3px;
    transition: background 0.1s;
    cursor: default;
    position: relative;
  }

  .icon-cell:hover { background: var(--hover); }
  .icon-cell iconify-icon { display: block; }

  .icon-cell .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--fg);
    color: var(--bg);
    padding: 3px 7px;
    border-radius: 3px;
    font-size: 9px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 100;
  }

  .icon-cell:hover .tooltip { display: block; }

  .single-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    gap: 24px;
    text-align: center;
  }

  .single-icon-display iconify-icon { display: block; }

  .single-nav { display: flex; align-items: center; gap: 20px; }

  .single-nav button {
    padding: 6px 16px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--fg);
    transition: all 0.1s;
  }

  .single-nav button:hover { background: var(--fg); color: var(--bg); }

  .single-icon-name { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .single-set-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

  /* Fullscreen */
  body.fullscreen .sidebar { display: none; }
  body.fullscreen .topbar { display: none; }
  body.fullscreen .canvas { padding: 0; }
  body.fullscreen .icon-grid { gap: 0; }
  body.fullscreen .icon-cell { border-radius: 0; }
  body.fullscreen .set-section { margin-bottom: 0; }
  body.fullscreen .set-section-header { display: none; }

  .fs-toolbar {
    display: none;
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    gap: 10px;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }

  body.fullscreen .fs-toolbar { display: flex; }

  .fs-toolbar .scale-slider { width: 100px; }

  .fs-toolbar select {
    font-family: inherit;
    font-size: 10px;
    font-weight: 500;
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    outline: none;
    max-width: 160px;
  }

  .fs-close {
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    transition: all 0.1s;
  }

  .fs-close:hover { background: var(--fg); color: var(--bg); }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 12px;
  }

  .keyboard-hint {
    padding: 6px 12px;
    font-size: 9px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }

  kbd {
    display: inline-block;
    padding: 1px 4px;
    font-family: inherit;
    font-size: 9px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--hover);
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Icon Sampler</h1>
      <p>100 icon sets via Iconify</p>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search sets..." oninput="filterSets(this.value)">
    </div>
    <div class="set-list" id="setList"></div>
    <div class="sidebar-actions">
      <button class="btn-secondary" onclick="selectNone()">None</button>
      <button class="btn-primary" onclick="selectAll()">All</button>
    </div>
    <div class="keyboard-hint">
      <kbd>F</kbd> Fullscreen <kbd>D</kbd> Dark <kbd>Esc</kbd> Exit <kbd>←</kbd><kbd>→</kbd> Nav
    </div>
  </div>

  <div class="resize-handle" id="resizeHandle"></div>

  <div class="main">
    <div class="topbar">
      <label>Scale</label>
      <input type="range" class="scale-slider" id="scaleSlider" min="12" max="512" value="24">
      <span class="scale-value" id="scaleValue">24px</span>
      <div class="scale-presets">
        <button onclick="setScale(16)">16</button>
        <button onclick="setScale(24)" class="active">24</button>
        <button onclick="setScale(48)">48</button>
        <button onclick="setScale(96)">96</button>
        <button onclick="setScale(128)">128</button>
        <button onclick="setScale(256)">256</button>
        <button onclick="setScale(512)">512</button>
      </div>
      <div class="view-toggle">
        <button class="active" onclick="setView('grid')" id="btnGrid">Grid</button>
        <button onclick="setView('single')" id="btnSingle">Single</button>
      </div>
      <button class="tb-btn" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="tb-btn" onclick="toggleDark()" id="btnDark">Dark</button>
    </div>
    <div class="canvas" id="canvas">
      <div class="empty-state">Select an icon set to begin</div>
    </div>
  </div>
</div>

<div class="fs-toolbar" id="fsToolbar">
  <select id="fsSetSelect" onchange="fsSelectSet(this.value)"></select>
  <label style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">Scale</label>
  <input type="range" class="scale-slider" id="fsScaleSlider" min="12" max="512" value="24">
  <span class="scale-value" id="fsScaleValue">24px</span>
  <div class="scale-presets">
    <button onclick="setScale(24)">24</button>
    <button onclick="setScale(48)">48</button>
    <button onclick="setScale(96)">96</button>
    <button onclick="setScale(256)">256</button>
    <button onclick="setScale(512)">512</button>
  </div>
  <button class="tb-btn" onclick="toggleDark()" id="btnDarkFs">Dark</button>
  <button class="fs-close" onclick="toggleFullscreen()" title="Exit (Esc)">&#215;</button>
</div>

const TIER_ORDER = ['Design System','General Purpose','Minimal','Artistic','Streamline','IconPark','Well-Crafted','Thematic','Font Awesome'];
let activeSets = new Set(['ph']);
let currentScale = 24;
let currentView = 'grid';
let singleIndex = 0;
let allVisibleIcons = [];
let searchFilter = '';

function renderSidebar() {
  const el = document.getElementById('setList');
  const filtered = searchFilter
    ? SETS.filter(s => s.name.toLowerCase().includes(searchFilter) || s.author.toLowerCase().includes(searchFilter) || s.tier.toLowerCase().includes(searchFilter))
    : SETS;

  let html = '';
  let lastTier = '';
  for (const s of filtered) {
    if (s.tier !== lastTier) {
      html += `<div class="tier-label">${s.tier}</div>`;
      lastTier = s.tier;
    }
    const active = activeSets.has(s.id) ? ' active' : '';
    html += `<div class="set-item${active}" onclick="loadSet('${s.id}')">
      <div class="dot"></div>
      <div class="set-info"><div class="set-name">${s.name}</div></div>
      <div class="set-count">${s.count.toLocaleString()}</div>
    </div>`;
  }
  el.innerHTML = html;
}

function filterSets(q) {
  searchFilter = q.toLowerCase();
  renderSidebar();
}

function loadSet(id) {
  activeSets.clear();
  activeSets.add(id);
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

function selectAll() {
  SETS.forEach(s => activeSets.add(s.id));
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

function selectNone() {
  activeSets.clear();
  renderSidebar();
  renderCanvas();
  syncFsSelect();
}

const slider = document.getElementById('scaleSlider');
const fsSlider = document.getElementById('fsScaleSlider');
slider.addEventListener('input', () => { currentScale = parseInt(slider.value); updateScale(); });
fsSlider.addEventListener('input', () => { currentScale = parseInt(fsSlider.value); updateScale(); });

function setScale(v) { currentScale = v; updateScale(); }

function updateScale() {
  slider.value = currentScale;
  fsSlider.value = currentScale;
  document.getElementById('scaleValue').textContent = currentScale + 'px';
  document.getElementById('fsScaleValue').textContent = currentScale + 'px';
  document.querySelectorAll('.scale-presets button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === currentScale);
  });
  renderCanvas();
}

function setView(v) {
  currentView = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnSingle').classList.toggle('active', v === 'single');
  singleIndex = 0;
  renderCanvas();
}

function toggleFullscreen() { document.body.classList.toggle('fullscreen'); }

function toggleDark() {
  document.body.classList.toggle('dark');
  const d = document.body.classList.contains('dark');
  document.getElementById('btnDark').textContent = d ? 'Light' : 'Dark';
  document.getElementById('btnDarkFs').textContent = d ? 'Light' : 'Dark';
}

function buildFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  let html = '<option value="__all__">All Sets</option>';
  let lastTier = '';
  for (const s of SETS) {
    if (s.tier !== lastTier) {
      if (lastTier) html += '</optgroup>';
      html += `<optgroup label="${s.tier}">`;
      lastTier = s.tier;
    }
    html += `<option value="${s.id}">${s.name} (${s.count.toLocaleString()})</option>`;
  }
  html += '</optgroup>';
  sel.innerHTML = html;
}

function syncFsSelect() {
  const sel = document.getElementById('fsSetSelect');
  if (activeSets.size === SETS.length) sel.value = '__all__';
  else if (activeSets.size === 1) sel.value = [...activeSets][0];
}

function fsSelectSet(val) {
  if (val === '__all__') selectAll();
  else loadSet(val);
}

function renderCanvas() {
  const canvas = document.getElementById('canvas');
  const active = SETS.filter(s => activeSets.has(s.id));

  if (!active.length) {
    canvas.innerHTML = '<div class="empty-state">Select an icon set to begin</div>';
    return;
  }

  if (currentView === 'single') return renderSingleView(canvas, active);

  const cellSize = Math.max(currentScale + 8, 28);

  canvas.innerHTML = active.map(s => {
    const icons = s.sample.map(n => `${s.prefix}:${n}`);
    return `<div class="set-section">
      <div class="set-section-header">
        <span class="set-section-title">${s.name}</span>
        <span class="set-section-count">${s.count.toLocaleString()} icons · ${s.license}</span>
        <span class="set-section-author">${s.author}</span>
      </div>
      <div class="icon-grid">${icons.map(icon =>
        `<div class="icon-cell" style="width:${cellSize}px">
          <iconify-icon icon="${icon}" width="${currentScale}" height="${currentScale}"></iconify-icon>
          <div class="tooltip">${icon}</div>
        </div>`
      ).join('')}</div>
    </div>`;
  }).join('');
}

function renderSingleView(canvas, active) {
  allVisibleIcons = [];
  active.forEach(s => {
    s.sample.forEach(n => allVisibleIcons.push({ icon: `${s.prefix}:${n}`, set: s.name }));
  });
  if (!allVisibleIcons.length) return;
  if (singleIndex >= allVisibleIcons.length) singleIndex = 0;
  if (singleIndex < 0) singleIndex = allVisibleIcons.length - 1;

  const c = allVisibleIcons[singleIndex];
  const sz = Math.max(currentScale * 3, 64);

  canvas.innerHTML = `<div class="single-view">
    <div class="single-set-name">${c.set}</div>
    <div class="single-icon-display">
      <iconify-icon icon="${c.icon}" width="${sz}" height="${sz}"></iconify-icon>
    </div>
    <div class="single-icon-name">${c.icon}</div>
    <div class="single-nav">
      <button onclick="navSingle(-1)">&larr; Prev</button>
      <span class="single-icon-name">${singleIndex + 1} / ${allVisibleIcons.length}</span>
      <button onclick="navSingle(1)">Next &rarr;</button>
    </div>
  </div>`;
}

function navSingle(dir) { singleIndex += dir; renderCanvas(); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { if (document.body.classList.contains('fullscreen')) toggleFullscreen(); return; }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'd' || e.key === 'D') toggleDark();
  if (e.key === 'ArrowLeft') { singleIndex--; renderCanvas(); }
  if (e.key === 'ArrowRight') { singleIndex++; renderCanvas(); }
});

// Resize handle
const resizeHandle = document.getElementById('resizeHandle');
const sidebar = document.querySelector('.sidebar');
let isResizing = false;

resizeHandle.addEventListener('mousedown', e => {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isResizing) return;
  const w = Math.min(500, Math.max(180, e.clientX));
  sidebar.style.width = w + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isResizing) return;
  isResizing = false;
  resizeHandle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

buildFsSelect();
renderSidebar();
renderCanvas();
syncFsSelect();
</script>
