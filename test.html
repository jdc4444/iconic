<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Export Roundtrip Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Helvetica, Arial, sans-serif; background: #fff; color: #000; padding: 20px; }
  h1 { margin-bottom: 8px; }
  #status { margin-bottom: 16px; color: #666; }
  #summary { margin-bottom: 16px; font-size: 14px; }
  #summary .pass { color: #2a2; font-weight: bold; }
  #summary .fail { color: #c22; font-weight: bold; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid #ddd; padding: 6px 8px; vertical-align: top; text-align: center; }
  th { background: #f5f5f5; position: sticky; top: 0; z-index: 2; }
  th:first-child, td:first-child { text-align: left; min-width: 160px; position: sticky; left: 0; background: #fff; z-index: 1; }
  th:first-child { z-index: 3; background: #f5f5f5; }
  .icon-name { font-family: monospace; font-size: 12px; word-break: break-all; }
  .cell { min-width: 90px; max-width: 160px; }
  .cell img, .cell svg { max-width: 48px; max-height: 48px; display: block; margin: 0 auto 4px; }
  .cell .css-preview { width: 48px; height: 48px; margin: 0 auto 4px; }
  .cell pre { text-align: left; font-size: 10px; max-height: 80px; overflow: hidden; white-space: pre-wrap; word-break: break-all; background: #f9f9f9; padding: 4px; border-radius: 3px; }
  .ok { color: #2a2; font-weight: bold; }
  .err { color: #c22; font-weight: bold; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: #333; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .table-wrap { overflow-x: auto; }
</style>
</head>
<body>

<h1>Iconic Export Roundtrip Test</h1>
<div id="status"><span class="spinner"></span> Fetching icon collections...</div>
<div id="summary"></div>
<div class="table-wrap">
  <table id="results">
    <thead>
      <tr>
        <th>Icon</th>
        <th>SVG</th>
        <th>PNG</th>
        <th>JPG</th>
        <th>WebP</th>
        <th>CSS</th>
        <th>Base64</th>
        <th>React</th>
        <th>Vue</th>
        <th>Svelte</th>
        <th>Swift</th>
        <th>Kotlin</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
// ── Conversion functions (copied from iconic/index.html) ──

async function getSVG(iconId) {
  const [prefix, name] = iconId.split(':');
  const resp = await fetch(`https://api.iconify.design/${prefix}/${name}.svg`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.text();
}

function svgToBlob(svg, format, scale = 256) {
  if (format === 'svg') return Promise.resolve(new Blob([svg], { type: 'image/svg+xml' }));
  const img = new Image();
  return new Promise((resolve) => {
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = scale; c.height = scale;
      const ctx = c.getContext('2d');
      if (format === 'jpg') { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, scale, scale); }
      ctx.drawImage(img, 0, 0, scale, scale);
      const mime = format === 'jpg' ? 'image/jpeg' : format === 'webp' ? 'image/webp' : 'image/png';
      c.toBlob(b => resolve(b), mime, 0.92);
    };
    img.onerror = () => resolve(null);
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  });
}

function svgToCSS(svg, name) {
  const b64 = btoa(unescape(encodeURIComponent(svg)));
  return `.icon-${name} {\n  display: inline-block;\n  width: 24px;\n  height: 24px;\n  background: url("data:image/svg+xml;base64,${b64}") no-repeat center/contain;\n}\n`;
}

function svgToBase64(svg) {
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

function svgToReact(svg, name) {
  const comp = name.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).replace(/\s/g, '');
  const jsx = svg
    .replace(/class=/g, 'className=')
    .replace(/clip-path/g, 'clipPath')
    .replace(/fill-rule/g, 'fillRule')
    .replace(/stroke-width/g, 'strokeWidth')
    .replace(/stroke-linecap/g, 'strokeLinecap')
    .replace(/stroke-linejoin/g, 'strokeLinejoin')
    .replace(/width="[^"]*"/, 'width={size}')
    .replace(/height="[^"]*"/, 'height={size}');
  return `import React from 'react';\n\nexport function ${comp}Icon({ size = 24, ...props }) {\n  return (\n    ${jsx}\n  );\n}\n`;
}

function svgToVue(svg, name) {
  const comp = name.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).replace(/\s/g, '');
  return '<template>\n  ' + svg.replace(/width="[^"]*"/, ':width="size"').replace(/height="[^"]*"/, ':height="size"') + '\n<\/template>\n\n<' + 'script>\nexport default {\n  name: \'' + comp + 'Icon\',\n  props: { size: { type: Number, default: 24 } }\n}\n<\/' + 'script>\n';
}

function svgToSvelte(svg, name) {
  return '<' + 'script>\n  export let size = 24;\n<\/' + 'script>\n\n' + svg.replace(/width="[^"]*"/, 'width={size}').replace(/height="[^"]*"/, 'height={size}') + '\n';
}

function svgToSwift(svg, name) {
  const comp = name.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()).replace(/\s/g, '');
  const b64 = btoa(unescape(encodeURIComponent(svg)));
  return `import SwiftUI\n\nstruct ${comp}Icon: View {\n    var size: CGFloat = 24\n    var body: some View {\n        Image(uiImage: UIImage(data: Data(base64Encoded: "${b64}")!)!)\n            .resizable()\n            .frame(width: size, height: size)\n    }\n}\n`;
}

function svgToKotlin(svg, name) {
  const viewBox = svg.match(/viewBox="([^"]+)"/) || ['', '0 0 24 24'];
  const vb = viewBox[1].split(/\s+/);
  const paths = [...svg.matchAll(/<path[^>]*d="([^"]+)"[^>]*/g)].map(m => m[1]);
  const fills = [...svg.matchAll(/<path[^>]*fill="([^"]+)"[^>]*/g)].map(m => m[1]);
  let xml = `<?xml version="1.0" encoding="utf-8"?>\n<vector xmlns:android="http://schemas.android.com/apk/res/android"\n    android:width="24dp" android:height="24dp"\n    android:viewportWidth="${vb[2]||24}" android:viewportHeight="${vb[3]||24}">\n`;
  paths.forEach((d, i) => { xml += `    <path android:fillColor="${fills[i]||'#000000'}" android:pathData="${d}" />\n`; });
  return xml + `</vector>\n`;
}

// ── Test runner ──

const FORMATS = ['svg', 'png', 'jpg', 'webp', 'css', 'base64', 'react', 'vue', 'svelte', 'swift', 'kotlin'];
const statusEl = document.getElementById('status');
const summaryEl = document.getElementById('summary');
const tbody = document.getElementById('tbody');

let totalTests = 0, passed = 0, failed = 0;

function setStatus(msg) { statusEl.innerHTML = msg; }

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function truncate(str, lines = 6) {
  const parts = str.split('\n');
  if (parts.length <= lines) return str;
  return parts.slice(0, lines).join('\n') + '\n...';
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function updateSummary() {
  summaryEl.innerHTML = `Tests: ${totalTests} | <span class="pass">${passed} passed</span> | <span class="fail">${failed} failed</span>`;
}

function markCell(td, success, content) {
  totalTests++;
  if (success) { passed++; } else { failed++; }
  const badge = success ? '<span class="ok">&#10003;</span>' : '<span class="err">&#10007;</span>';
  td.innerHTML = content + '<br>' + badge;
  updateSummary();
}

async function renderImageCell(td, svg, format) {
  try {
    const blob = await svgToBlob(svg, format);
    if (!blob || blob.size === 0) { markCell(td, false, '<em>empty blob</em>'); return; }
    const url = URL.createObjectURL(blob);
    markCell(td, true, `<img src="${url}" alt="${format}">`);
  } catch (e) {
    markCell(td, false, `<em>${escHtml(e.message)}</em>`);
  }
}

function renderSVGCell(td, svg) {
  try {
    if (!svg || svg.length === 0) { markCell(td, false, '<em>empty</em>'); return; }
    // Render inline - wrap in a sized container
    const safe = svg.replace(/<script[\s\S]*?<\/script>/gi, '');
    markCell(td, true, `<div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin:0 auto">${safe}</div>`);
  } catch (e) {
    markCell(td, false, `<em>${escHtml(e.message)}</em>`);
  }
}

function renderCSSCell(td, svg, iconName) {
  try {
    const css = svgToCSS(svg, iconName);
    if (!css || css.length === 0) { markCell(td, false, '<em>empty</em>'); return; }
    // Inject a style and show preview div
    const styleId = 'css-' + iconName + '-' + Math.random().toString(36).slice(2, 8);
    const styleEl = document.createElement('style');
    styleEl.textContent = css.replace(`.icon-${iconName}`, `.${styleId}`);
    document.head.appendChild(styleEl);
    markCell(td, true, `<div class="css-preview ${styleId}"></div><pre>${escHtml(truncate(css, 4))}</pre>`);
  } catch (e) {
    markCell(td, false, `<em>${escHtml(e.message)}</em>`);
  }
}

function renderBase64Cell(td, svg) {
  try {
    const uri = svgToBase64(svg);
    if (!uri || uri.length < 30) { markCell(td, false, '<em>empty</em>'); return; }
    markCell(td, true, `<img src="${uri}" alt="base64" style="max-width:48px;max-height:48px">`);
  } catch (e) {
    markCell(td, false, `<em>${escHtml(e.message)}</em>`);
  }
}

function renderCodeCell(td, code, label) {
  try {
    if (!code || code.length === 0) { markCell(td, false, '<em>empty</em>'); return; }
    // Extract SVG from component code and render it visually
    const svgMatch = code.match(/<svg[\s\S]*?<\/svg>/i);
    let visual = '';
    if (svgMatch) {
      const safe = svgMatch[0]
        .replace(/\{size\}/g, '48').replace(/:width="size"/g, 'width="48"').replace(/:height="size"/g, 'height="48"')
        .replace(/className=/g, 'class=').replace(/width=\{size\}/g, 'width="48"').replace(/height=\{size\}/g, 'height="48"')
        .replace(/<script[\s\S]*?<\/script>/gi, '');
      visual = `<div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin:0 auto">${safe}</div>`;
    } else if (label === 'Swift') {
      // Swift uses base64 encoded SVG - decode and render
      const b64Match = code.match(/base64Encoded:\s*"([^"]+)"/);
      if (b64Match) {
        try {
          const decoded = atob(b64Match[1]);
          const safeSvg = decoded.replace(/<script[\s\S]*?<\/script>/gi, '');
          visual = `<div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin:0 auto">${safeSvg}</div>`;
        } catch(e) { visual = ''; }
      }
    } else if (label === 'Kotlin') {
      // Kotlin is Android Vector Drawable XML - show the path data as an SVG
      const vw = code.match(/viewportWidth="([^"]+)"/) || ['','24'];
      const vh = code.match(/viewportHeight="([^"]+)"/) || ['','24'];
      const paths = [...code.matchAll(/fillColor="([^"]+)"[^>]*pathData="([^"]+)"/g)];
      if (paths.length) {
        let pathsSvg = paths.map(m => `<path fill="${m[1]}" d="${m[2]}"/>`).join('');
        visual = `<div style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;margin:0 auto"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${vw[1]} ${vh[1]}" width="48" height="48">${pathsSvg}</svg></div>`;
      }
    }
    if (!visual) {
      markCell(td, false, `<pre>${escHtml(truncate(code, 4))}</pre>`);
    } else {
      markCell(td, true, visual);
    }
  } catch (e) {
    markCell(td, false, `<em>${escHtml(e.message)}</em>`);
  }
}

async function testIcon(iconId) {
  const tr = document.createElement('tr');
  const nameTd = document.createElement('td');
  nameTd.className = 'icon-name';
  nameTd.textContent = iconId;
  tr.appendChild(nameTd);

  // Create placeholder cells
  const cells = {};
  for (const fmt of FORMATS) {
    const td = document.createElement('td');
    td.className = 'cell';
    td.innerHTML = '<span class="spinner"></span>';
    tr.appendChild(td);
    cells[fmt] = td;
  }
  tbody.appendChild(tr);

  let svg;
  try {
    svg = await getSVG(iconId);
  } catch (e) {
    // Mark all cells as failed
    for (const fmt of FORMATS) {
      markCell(cells[fmt], false, `<em>SVG fetch failed: ${escHtml(e.message)}</em>`);
    }
    return;
  }

  const iconName = iconId.replace(':', '-');
  const shortName = iconId.split(':')[1] || iconName;

  // SVG
  renderSVGCell(cells['svg'], svg);

  // PNG, JPG, WebP (async, canvas-based)
  renderImageCell(cells['png'], svg, 'png');
  renderImageCell(cells['jpg'], svg, 'jpg');
  renderImageCell(cells['webp'], svg, 'webp');

  // CSS
  renderCSSCell(cells['css'], svg, iconName);

  // Base64
  renderBase64Cell(cells['base64'], svg);

  // React
  renderCodeCell(cells['react'], svgToReact(svg, shortName), 'React');

  // Vue
  renderCodeCell(cells['vue'], svgToVue(svg, shortName), 'Vue');

  // Svelte
  renderCodeCell(cells['svelte'], svgToSvelte(svg, shortName), 'Svelte');

  // Swift
  renderCodeCell(cells['swift'], svgToSwift(svg, shortName), 'Swift');

  // Kotlin
  renderCodeCell(cells['kotlin'], svgToKotlin(svg, shortName), 'Kotlin');
}

async function run() {
  try {
    // Step 1: Fetch collection list
    setStatus('<span class="spinner"></span> Fetching icon collections from Iconify...');
    const collectionsResp = await fetch('https://api.iconify.design/collections');
    if (!collectionsResp.ok) throw new Error('Failed to fetch collections');
    const collections = await collectionsResp.json();
    const allPrefixes = Object.keys(collections);

    // Step 2: Pick 20 random sets
    const shuffled = shuffleArray([...allPrefixes]);
    const selectedSets = shuffled.slice(0, 20);
    setStatus(`<span class="spinner"></span> Fetching icons from 20 random sets: ${selectedSets.join(', ')}...`);

    // Step 3: From each set, pick a random icon to get 10 total (some sets may fail)
    const iconIds = [];
    const setQueue = [...selectedSets];

    while (iconIds.length < 10 && setQueue.length > 0) {
      // Fetch in batches
      const batch = setQueue.splice(0, 5);
      const results = await Promise.allSettled(batch.map(async prefix => {
        const resp = await fetch(`https://api.iconify.design/collection?prefix=${prefix}`);
        if (!resp.ok) return null;
        const data = await resp.json();
        // Icons can be in uncategorized array or in categories object
        let icons = [];
        if (data.uncategorized) icons = icons.concat(data.uncategorized);
        if (data.categories) {
          for (const cat of Object.values(data.categories)) {
            icons = icons.concat(cat);
          }
        }
        if (icons.length === 0) return null;
        const pick = icons[Math.floor(Math.random() * icons.length)];
        return `${prefix}:${pick}`;
      }));

      for (const r of results) {
        if (r.status === 'fulfilled' && r.value && iconIds.length < 10) {
          iconIds.push(r.value);
        }
      }
    }

    if (iconIds.length === 0) throw new Error('Could not fetch any icons');

    setStatus(`<span class="spinner"></span> Testing ${iconIds.length} icons across ${FORMATS.length} formats...`);

    // Step 4: Run export tests for each icon
    for (const iconId of iconIds) {
      await testIcon(iconId);
    }

    setStatus(`Done. Tested ${iconIds.length} icons x ${FORMATS.length} formats = ${iconIds.length * FORMATS.length} conversions.`);

    // Step 5: Loading animation tests
    await testLoadingAnimations();

  } catch (e) {
    setStatus(`<span class="err">Error: ${escHtml(e.message)}</span>`);
    console.error(e);
  }
}

async function testLoadingAnimations() {
  // Add a loading animation section
  const section = document.createElement('div');
  section.innerHTML = '<h2 style="margin:24px 0 12px">Loading Animation Roundtrip</h2><p style="margin-bottom:12px;color:#666">Testing 10 random loading animations render and animate correctly.</p>';
  document.body.appendChild(section);

  const grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:24px';
  section.appendChild(grid);

  // Test loaders covering different animation types
  const catalog = [
    { label: 'Border Spin', style: 'width:20px;height:20px;border:3px solid rgba(0,0,0,0.1);border-top-color:#333;border-radius:50%;animation:spin 0.8s linear infinite', inner: '' },
    { label: 'Pulse Dot', style: 'width:12px;height:12px;border-radius:50%;background:#333;animation:lio-pulse 1s ease-in-out infinite', inner: '' },
    { label: 'Bounce Ball', style: 'width:12px;height:12px;border-radius:50%;background:#333;animation:lio-bounce 1s ease-in-out infinite', inner: '' },
    { label: 'Dual Ring', style: 'width:20px;height:20px;border:3px solid #333;border-radius:50%;border-top-color:transparent;border-bottom-color:transparent;animation:spin 1s linear infinite', inner: '' },
    { label: 'Bar Scale', style: 'display:flex;gap:2px;align-items:center;height:20px', inner: '<span style="width:3px;height:60%;background:#333;border-radius:1px;animation:ld-stretch 1s ease-in-out infinite"></span><span style="width:3px;height:100%;background:#333;border-radius:1px;animation:ld-stretch 1s ease-in-out infinite;animation-delay:0.1s"></span><span style="width:3px;height:60%;background:#333;border-radius:1px;animation:ld-stretch 1s ease-in-out infinite;animation-delay:0.2s"></span>' },
    { label: 'Shimmer Bar', style: 'width:40px;height:6px;border-radius:3px;background:linear-gradient(90deg,#e4e6eb 25%,#f0f2f5 37%,#e4e6eb 63%);background-size:200% 100%;animation:btn-skeleton 1.2s ease-in-out infinite', inner: '' },
    { label: 'Conic Gradient', style: 'width:20px;height:20px;border-radius:50%;background:conic-gradient(from 0deg,transparent,#333);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2.5px));mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 2.5px));animation:spin 0.9s linear infinite', inner: '' },
    { label: 'Dot Flow', style: 'display:flex;gap:4px;align-items:center', inner: '<span style="width:6px;height:6px;border-radius:50%;background:#333;animation:ld-dot-bounce 0.6s ease-in-out infinite"></span><span style="width:6px;height:6px;border-radius:50%;background:#333;animation:ld-dot-bounce 0.6s ease-in-out infinite;animation-delay:0.1s"></span><span style="width:6px;height:6px;border-radius:50%;background:#333;animation:ld-dot-bounce 0.6s ease-in-out infinite;animation-delay:0.2s"></span>' },
    { label: 'Flip Square', style: 'width:14px;height:14px;background:#333;animation:lio-flip-h 1.2s ease-in-out infinite', inner: '' },
    { label: 'Fade Ring', style: 'width:20px;height:20px;border:3px solid #333;border-radius:50%;animation:lio-fade 1.5s ease-in-out infinite', inner: '' },
  ];

  if (catalog.length === 0) {
    grid.innerHTML = '<p style="color:#c22">Could not load animation catalog</p>';
    return;
  }

  // Pick 10 random
  const picks = shuffleArray([...catalog]).slice(0, 10);
  let animPass = 0, animFail = 0;

  // Inject required keyframes
  const style = document.createElement('style');
  style.textContent = `
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes lio-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    @keyframes lio-bounce { 0%,100% { transform: translateY(0) scaleY(1); } 30% { transform: translateY(-12px); } 55% { transform: translateY(0) scaleX(1.1) scaleY(0.85); } }
    @keyframes lio-flip-h { to { transform: rotateY(360deg); } }
    @keyframes lio-fade { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes ld-stretch { 0%,100% { transform: scaleY(0.5); } 50% { transform: scaleY(1); } }
    @keyframes ld-dot-bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes btn-skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  `;
  document.head.appendChild(style);

  for (const item of picks) {
    const card = document.createElement('div');
    card.style.cssText = 'border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px';

    const preview = document.createElement('div');
    preview.style.cssText = 'width:40px;height:40px;display:flex;align-items:center;justify-content:center;overflow:hidden';
    const inner = document.createElement('div');
    inner.setAttribute('style', item.style);
    inner.innerHTML = item.inner;
    preview.appendChild(inner);

    const label = document.createElement('div');
    label.style.cssText = 'font-size:11px;color:#666;word-break:break-word';
    label.textContent = item.label;

    // Check if animation is running
    card.appendChild(preview);
    card.appendChild(label);
    grid.appendChild(card);

    await new Promise(r => setTimeout(r, 100));

    const cs = getComputedStyle(inner);
    const hasAnim = cs.animationName && cs.animationName !== 'none';
    const hasSize = inner.offsetWidth > 0 || inner.offsetHeight > 0 || item.inner;

    const badge = document.createElement('div');
    if (hasAnim && hasSize) {
      badge.innerHTML = '<span style="color:#2a2;font-weight:bold">✓ animating</span>';
      animPass++;
    } else if (hasSize) {
      badge.innerHTML = '<span style="color:#f90;font-weight:bold">⚠ static</span>';
      animPass++; // still visible, just no CSS animation detected
    } else {
      badge.innerHTML = '<span style="color:#c22;font-weight:bold">✗ invisible</span>';
      animFail++;
    }
    badge.style.fontSize = '11px';
    card.appendChild(badge);

    totalTests++; if (hasSize) passed++; else failed++;
    updateSummary();
  }

  const animSummary = document.createElement('p');
  animSummary.style.cssText = 'font-size:14px;margin-bottom:16px';
  animSummary.innerHTML = `Animations: <span class="pass">${animPass} visible</span> | <span class="fail">${animFail} invisible</span>`;
  section.insertBefore(animSummary, grid);
}

run();
</script>
</body>
</html>
